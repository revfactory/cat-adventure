<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 44">
  <defs>
    <linearGradient id="cat-body-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF8C42"/>
      <stop offset="100%" stop-color="#E8792F"/>
    </linearGradient>
  </defs>
  <!-- Rotated/fallen cat -->
  <g id="cat-dead" transform="rotate(90 24 24) translate(0 4)">
    <!-- Tail limp -->
    <path d="M18 34 Q14 38 16 40" fill="none" stroke="#FF8C42" stroke-width="3" stroke-linecap="round"/>
    <!-- Legs stiff up -->
    <g id="cat-legs">
      <rect x="16" y="34" width="4.5" height="6" rx="2.2" fill="#FF8C42" transform="rotate(-20 18 34)"/>
      <rect x="22" y="34" width="4.5" height="6" rx="2.2" fill="#FF8C42" transform="rotate(20 24 34)"/>
      <rect x="27" y="35" width="4" height="5.5" rx="2" fill="#E06B1F" transform="rotate(-15 29 35)"/>
      <rect x="12" y="35" width="4" height="5.5" rx="2" fill="#E06B1F" transform="rotate(15 14 35)"/>
    </g>
    <!-- Body -->
    <ellipse id="cat-body" cx="24" cy="30" rx="10" ry="7" fill="url(#cat-body-grad)" opacity="0.8"/>
    <ellipse cx="24" cy="32" rx="6" ry="4" fill="#FFF5E6" opacity="0.8"/>
    <!-- Head -->
    <g id="cat-head">
      <ellipse cx="24" cy="14" rx="11" ry="10" fill="#FF8C42" opacity="0.85"/>
      <polygon points="15,8 12,1 18,5" fill="#FF8C42" opacity="0.85"/>
      <polygon points="33,8 36,1 30,5" fill="#FF8C42" opacity="0.85"/>
      <!-- X eyes -->
      <g stroke="#2C3E50" stroke-width="2" stroke-linecap="round">
        <line x1="16.5" y1="10.5" x2="21.5" y2="15.5"/>
        <line x1="21.5" y1="10.5" x2="16.5" y2="15.5"/>
        <line x1="26.5" y1="10.5" x2="31.5" y2="15.5"/>
        <line x1="31.5" y1="10.5" x2="26.5" y2="15.5"/>
      </g>
      <ellipse cx="24" cy="17" rx="1.5" ry="1" fill="#FF6B9D"/>
      <!-- Tongue out -->
      <path d="M25 19 Q26 22 24.5 22" fill="#FF6B9D" stroke="#E06B1F" stroke-width="0.5"/>
      <!-- Ghost -->
      <g opacity="0.4" transform="translate(30 -2)">
        <ellipse cx="5" cy="5" rx="4" ry="3" fill="white"/>
        <circle cx="3.5" cy="4.5" r="0.8" fill="#2C3E50"/>
        <circle cx="6.5" cy="4.5" r="0.8" fill="#2C3E50"/>
        <path d="M1 8 Q2 6 3 8 Q4 6 5 8 Q6 6 7 8 Q8 6 9 8" fill="white"/>
      </g>
    </g>
  </g>
</svg>

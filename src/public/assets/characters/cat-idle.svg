<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 44">
  <defs>
    <linearGradient id="cat-body-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF8C42"/>
      <stop offset="100%" stop-color="#E8792F"/>
    </linearGradient>
  </defs>
  <!-- Body -->
  <g id="cat-idle">
    <!-- Tail -->
    <g id="cat-tail" transform-origin="18 32">
      <path d="M18 32 Q10 30 8 24 Q6 18 10 16" fill="none" stroke="#FF8C42" stroke-width="3" stroke-linecap="round"/>
      <circle cx="10" cy="16" r="1.5" fill="#E06B1F"/>
    </g>
    <!-- Back legs -->
    <g id="cat-legs-back">
      <rect x="17" y="35" width="5" height="7" rx="2.5" fill="#E06B1F"/>
      <rect x="26" y="35" width="5" height="7" rx="2.5" fill="#E06B1F"/>
      <!-- Paws -->
      <ellipse cx="19.5" cy="42.5" rx="3" ry="1.5" fill="#FFF5E6"/>
      <ellipse cx="28.5" cy="42.5" rx="3" ry="1.5" fill="#FFF5E6"/>
    </g>
    <!-- Body torso -->
    <ellipse id="cat-body" cx="24" cy="30" rx="10" ry="7" fill="url(#cat-body-grad)"/>
    <!-- Belly -->
    <ellipse cx="24" cy="32" rx="6" ry="4" fill="#FFF5E6"/>
    <!-- Stripes on body -->
    <g opacity="0.6">
      <path d="M20 25 Q24 23 28 25" fill="none" stroke="#E06B1F" stroke-width="1"/>
      <path d="M19 28 Q24 26 29 28" fill="none" stroke="#E06B1F" stroke-width="1"/>
    </g>
    <!-- Front legs -->
    <g id="cat-legs-front">
      <rect x="17" y="34" width="4.5" height="7.5" rx="2.2" fill="#FF8C42"/>
      <rect x="26.5" y="34" width="4.5" height="7.5" rx="2.2" fill="#FF8C42"/>
      <ellipse cx="19.2" cy="42" rx="2.8" ry="1.5" fill="#FFF5E6"/>
      <ellipse cx="28.8" cy="42" rx="2.8" ry="1.5" fill="#FFF5E6"/>
    </g>
    <!-- Head -->
    <g id="cat-head">
      <!-- Head shape -->
      <ellipse cx="24" cy="14" rx="11" ry="10" fill="#FF8C42"/>
      <!-- Ears -->
      <polygon points="15,8 12,1 18,5" fill="#FF8C42"/>
      <polygon points="33,8 36,1 30,5" fill="#FF8C42"/>
      <polygon points="15.5,7.5 13,2.5 17.5,5.5" fill="#FFB89A"/>
      <polygon points="32.5,7.5 35,2.5 30.5,5.5" fill="#FFB89A"/>
      <!-- Face stripes -->
      <path d="M17 10 L14 8" stroke="#E06B1F" stroke-width="1" stroke-linecap="round"/>
      <path d="M31 10 L34 8" stroke="#E06B1F" stroke-width="1" stroke-linecap="round"/>
      <path d="M24 6 L24 3" stroke="#E06B1F" stroke-width="1" stroke-linecap="round"/>
      <!-- Eyes -->
      <g id="cat-eyes">
        <ellipse cx="19" cy="13" rx="3.5" ry="3.8" fill="white"/>
        <ellipse cx="29" cy="13" rx="3.5" ry="3.8" fill="white"/>
        <ellipse cx="19" cy="13" rx="2.8" ry="3" fill="#4ECDC4"/>
        <ellipse cx="29" cy="13" rx="2.8" ry="3" fill="#4ECDC4"/>
        <ellipse cx="19.5" cy="12.5" rx="1.5" ry="2" fill="#2C3E50"/>
        <ellipse cx="29.5" cy="12.5" rx="1.5" ry="2" fill="#2C3E50"/>
        <!-- Eye shine -->
        <circle cx="20.5" cy="11.5" r="0.8" fill="white"/>
        <circle cx="30.5" cy="11.5" r="0.8" fill="white"/>
      </g>
      <!-- Nose -->
      <ellipse cx="24" cy="17" rx="1.5" ry="1" fill="#FF6B9D"/>
      <!-- Mouth -->
      <path d="M22 18.5 Q24 20 26 18.5" fill="none" stroke="#E06B1F" stroke-width="0.8" stroke-linecap="round"/>
      <!-- Whiskers -->
      <g stroke="#E06B1F" stroke-width="0.5" opacity="0.7">
        <line x1="12" y1="15" x2="17" y2="16"/>
        <line x1="12" y1="17" x2="17" y2="17"/>
        <line x1="31" y1="16" x2="36" y2="15"/>
        <line x1="31" y1="17" x2="36" y2="17"/>
      </g>
      <!-- Cheeks -->
      <circle cx="16" cy="17" r="2" fill="#FFB89A" opacity="0.4"/>
      <circle cx="32" cy="17" r="2" fill="#FFB89A" opacity="0.4"/>
    </g>
  </g>
</svg>

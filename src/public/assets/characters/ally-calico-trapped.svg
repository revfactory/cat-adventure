<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <g id="ally-calico-trapped">
    <!-- Pipe structure -->
    <rect x="6" y="8" width="36" height="10" rx="5" fill="#7F8C8D" stroke="#5D6D7E" stroke-width="1.5"/>
    <rect x="6" y="28" width="36" height="10" rx="5" fill="#7F8C8D" stroke="#5D6D7E" stroke-width="1.5"/>
    <!-- Rope/joint -->
    <g stroke="#C9A96E" stroke-width="2" fill="none">
      <path d="M16 18 Q14 23 16 28"/>
      <path d="M32 18 Q34 23 32 28"/>
      <path d="M20 18 L20 28"/>
      <path d="M28 18 L28 28"/>
    </g>
    <!-- Cat squeezed between pipes -->
    <g transform="translate(0 0)">
      <ellipse cx="24" cy="23" rx="9" ry="5" fill="#ECF0F1"/>
      <ellipse cx="19" cy="22" rx="3.5" ry="2.5" fill="#FF8C42" opacity="0.85"/>
      <ellipse cx="30" cy="23" rx="3" ry="2" fill="#2C3E50" opacity="0.85"/>
      <!-- Head squeezed -->
      <ellipse cx="24" cy="23" rx="8" ry="5.5" fill="#ECF0F1"/>
      <ellipse cx="20" cy="21.5" rx="3.5" ry="2.5" fill="#FF8C42" opacity="0.8"/>
      <!-- Squished eyes -->
      <ellipse cx="20" cy="22" rx="2.5" ry="2" fill="white"/>
      <ellipse cx="28" cy="22" rx="2.5" ry="2" fill="white"/>
      <ellipse cx="20" cy="22" rx="1.8" ry="1.5" fill="#E67E22"/>
      <ellipse cx="28" cy="22" rx="1.8" ry="1.5" fill="#E67E22"/>
      <circle cx="20" cy="22" r="1" fill="#2C3E50"/>
      <circle cx="28" cy="22" r="1" fill="#2C3E50"/>
      <!-- Strained expression -->
      <ellipse cx="24" cy="25" rx="1" ry="0.6" fill="#FF6B9D"/>
      <path d="M22 26 Q24 27.5 26 26" fill="none" stroke="#BDC3C7" stroke-width="0.8"/>
      <!-- Ears poking above pipe -->
      <polygon points="18,9 16,5 20,8" fill="#FF8C42"/>
      <polygon points="30,9 32,5 28,8" fill="#2C3E50"/>
    </g>
    <!-- Paws sticking out sides -->
    <ellipse cx="6" cy="23" rx="3" ry="2" fill="#FFF5E6"/>
    <ellipse cx="42" cy="23" rx="3" ry="2" fill="#FF8C42"/>
  </g>
</svg>

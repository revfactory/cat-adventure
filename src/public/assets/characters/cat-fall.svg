<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 44">
  <defs>
    <linearGradient id="cat-body-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF8C42"/>
      <stop offset="100%" stop-color="#E8792F"/>
    </linearGradient>
  </defs>
  <g id="cat-fall">
    <!-- Tail up and spread -->
    <path d="M16 28 Q8 24 6 18 Q5 12 9 10" fill="none" stroke="#FF8C42" stroke-width="3" stroke-linecap="round"/>
    <!-- All four legs spread out -->
    <!-- Back left -->
    <rect x="12" y="32" width="5" height="7" rx="2.5" fill="#E06B1F" transform="rotate(30 14 32)"/>
    <!-- Back right -->
    <rect x="31" y="32" width="5" height="7" rx="2.5" fill="#E06B1F" transform="rotate(-30 33 32)"/>
    <!-- Paws back -->
    <ellipse cx="10" cy="38" rx="2.5" ry="1.3" fill="#FFF5E6"/>
    <ellipse cx="38" cy="38" rx="2.5" ry="1.3" fill="#FFF5E6"/>
    <!-- Body -->
    <ellipse id="cat-body" cx="24" cy="29" rx="10" ry="6.5" fill="url(#cat-body-grad)"/>
    <ellipse cx="24" cy="31" rx="6" ry="3.5" fill="#FFF5E6"/>
    <!-- Stripes -->
    <path d="M20 25 Q24 23 28 25" fill="none" stroke="#E06B1F" stroke-width="1" opacity="0.6"/>
    <!-- Front left -->
    <rect x="10" y="24" width="4.5" height="7" rx="2.2" fill="#FF8C42" transform="rotate(35 12 24)"/>
    <!-- Front right -->
    <rect x="33" y="24" width="4.5" height="7" rx="2.2" fill="#FF8C42" transform="rotate(-35 35 24)"/>
    <!-- Paws front -->
    <ellipse cx="7" cy="27" rx="2.5" ry="1.3" fill="#FFF5E6"/>
    <ellipse cx="41" cy="27" rx="2.5" ry="1.3" fill="#FFF5E6"/>
    <!-- Head -->
    <g id="cat-head">
      <ellipse cx="24" cy="14" rx="11" ry="10" fill="#FF8C42"/>
      <polygon points="15,8 12,1 18,5" fill="#FF8C42"/>
      <polygon points="33,8 36,1 30,5" fill="#FF8C42"/>
      <polygon points="15.5,7.5 13,2.5 17.5,5.5" fill="#FFB89A"/>
      <polygon points="32.5,7.5 35,2.5 30.5,5.5" fill="#FFB89A"/>
      <!-- Wide scared eyes -->
      <g id="cat-eyes">
        <ellipse cx="19" cy="13" rx="4" ry="4.2" fill="white"/>
        <ellipse cx="29" cy="13" rx="4" ry="4.2" fill="white"/>
        <ellipse cx="19" cy="13" rx="3" ry="3.5" fill="#4ECDC4"/>
        <ellipse cx="29" cy="13" rx="3" ry="3.5" fill="#4ECDC4"/>
        <circle cx="19" cy="13" r="2" fill="#2C3E50"/>
        <circle cx="29" cy="13" r="2" fill="#2C3E50"/>
        <circle cx="20" cy="12" r="0.8" fill="white"/>
        <circle cx="30" cy="12" r="0.8" fill="white"/>
      </g>
      <ellipse cx="24" cy="17" rx="1.5" ry="1" fill="#FF6B9D"/>
      <!-- Open mouth (surprised) -->
      <ellipse cx="24" cy="19.5" rx="2" ry="1.5" fill="#E06B1F"/>
      <ellipse cx="24" cy="19" rx="1.5" ry="1" fill="#2C3E50"/>
      <g stroke="#E06B1F" stroke-width="0.5" opacity="0.7">
        <line x1="11" y1="15" x2="17" y2="16"/>
        <line x1="11" y1="17" x2="17" y2="17"/>
        <line x1="31" y1="16" x2="37" y2="15"/>
        <line x1="31" y1="17" x2="37" y2="17"/>
      </g>
    </g>
  </g>
</svg>

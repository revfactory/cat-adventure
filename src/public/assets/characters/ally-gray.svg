<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <g id="ally-gray">
    <!-- Tail -->
    <path d="M18 32 Q10 30 8 24 Q6 18 10 16" fill="none" stroke="#95A5A6" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Back legs -->
    <rect x="17" y="35" width="4.5" height="7" rx="2.2" fill="#7F8C8D"/>
    <rect x="26.5" y="35" width="4.5" height="7" rx="2.2" fill="#7F8C8D"/>
    <ellipse cx="19.2" cy="42.5" rx="2.8" ry="1.3" fill="#ECF0F1"/>
    <ellipse cx="28.8" cy="42.5" rx="2.8" ry="1.3" fill="#ECF0F1"/>
    <!-- Body (slimmer) -->
    <ellipse cx="24" cy="30" rx="9" ry="6.5" fill="#95A5A6"/>
    <ellipse cx="24" cy="32" rx="5.5" ry="3.5" fill="#ECF0F1"/>
    <!-- Stripes -->
    <path d="M20 26 Q24 24.5 28 26" fill="none" stroke="#7F8C8D" stroke-width="1" opacity="0.5"/>
    <!-- Front legs -->
    <rect x="17.5" y="34" width="4" height="7.5" rx="2" fill="#95A5A6"/>
    <rect x="27" y="34" width="4" height="7.5" rx="2" fill="#95A5A6"/>
    <ellipse cx="19.5" cy="42" rx="2.5" ry="1.3" fill="#ECF0F1"/>
    <ellipse cx="29" cy="42" rx="2.5" ry="1.3" fill="#ECF0F1"/>
    <!-- Head -->
    <g id="cat-head">
      <ellipse cx="24" cy="14" rx="10.5" ry="9.5" fill="#95A5A6"/>
      <!-- Ears (one folded) -->
      <polygon points="15,8 12,1 18,5" fill="#95A5A6"/>
      <polygon points="33,7 35,1 30,5" fill="#95A5A6"/>
      <polygon points="15.5,7.5 13,2.5 17.5,5.5" fill="#BDC3C7"/>
      <!-- Folded ear right -->
      <polygon points="33,7.5 34,3 30.5,5.5" fill="#BDC3C7"/>
      <path d="M33 7 Q34 5 33.5 4" fill="#7F8C8D" opacity="0.5"/>
      <!-- Eyes (green) -->
      <ellipse cx="19" cy="13" rx="3.2" ry="3.5" fill="white"/>
      <ellipse cx="29" cy="13" rx="3.2" ry="3.5" fill="white"/>
      <ellipse cx="19" cy="13" rx="2.5" ry="2.8" fill="#27AE60"/>
      <ellipse cx="29" cy="13" rx="2.5" ry="2.8" fill="#27AE60"/>
      <ellipse cx="19.5" cy="12.5" rx="1.3" ry="1.8" fill="#2C3E50"/>
      <ellipse cx="29.5" cy="12.5" rx="1.3" ry="1.8" fill="#2C3E50"/>
      <circle cx="20.3" cy="11.5" r="0.7" fill="white"/>
      <circle cx="30.3" cy="11.5" r="0.7" fill="white"/>
      <!-- Nose -->
      <ellipse cx="24" cy="17" rx="1.3" ry="0.9" fill="#FF6B9D"/>
      <path d="M22.5 18.5 Q24 19.5 25.5 18.5" fill="none" stroke="#7F8C8D" stroke-width="0.8"/>
      <!-- Whiskers -->
      <g stroke="#7F8C8D" stroke-width="0.5" opacity="0.6">
        <line x1="12" y1="15.5" x2="17" y2="16.5"/>
        <line x1="12" y1="17.5" x2="17" y2="17"/>
        <line x1="31" y1="16.5" x2="36" y2="15.5"/>
        <line x1="31" y1="17" x2="36" y2="17.5"/>
      </g>
    </g>
  </g>
</svg>

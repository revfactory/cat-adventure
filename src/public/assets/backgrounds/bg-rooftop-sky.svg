<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="rooftop-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="30%" stop-color="#E74C3C"/>
      <stop offset="60%" stop-color="#F39C12"/>
      <stop offset="100%" stop-color="#F7DC6F"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#rooftop-sky)"/>
  <!-- Setting sun -->
  <circle cx="400" cy="400" r="60" fill="#F1C40F" opacity="0.8"/>
  <circle cx="400" cy="400" r="50" fill="#F7DC6F"/>
  <circle cx="400" cy="400" r="80" fill="#F39C12" opacity="0.15"/>
  <!-- Sun rays -->
  <g stroke="#F1C40F" stroke-width="1.5" opacity="0.2">
    <line x1="400" y1="300" x2="400" y2="280"/>
    <line x1="440" y1="310" x2="460" y2="295"/>
    <line x1="360" y1="310" x2="340" y2="295"/>
    <line x1="470" y1="340" x2="495" y2="330"/>
    <line x1="330" y1="340" x2="305" y2="330"/>
  </g>
  <!-- Stars appearing -->
  <g fill="white" opacity="0.4">
    <circle cx="100" cy="60" r="1.5"/>
    <circle cx="200" cy="40" r="1"/>
    <circle cx="600" cy="50" r="1.2"/>
    <circle cx="700" cy="70" r="1.5"/>
    <circle cx="50" cy="100" r="0.8"/>
    <circle cx="750" cy="90" r="1"/>
  </g>
  <!-- Clouds (sunset colored) -->
  <g fill="#E74C3C" opacity="0.3">
    <ellipse cx="200" cy="300" rx="80" ry="15"/>
    <ellipse cx="600" cy="320" rx="70" ry="12"/>
    <ellipse cx="500" cy="350" rx="90" ry="14"/>
  </g>
</svg>

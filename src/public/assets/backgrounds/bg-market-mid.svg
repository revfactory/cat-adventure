<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Market stalls -->
  <g>
    <!-- Stall 1 (fish) -->
    <rect x="50" y="350" width="100" height="80" fill="#BDC3C7"/>
    <rect x="40" y="330" width="120" height="20" rx="2" fill="#E74C3C"/>
    <rect x="40" y="320" width="120" height="12" rx="2" fill="white" opacity="0.3"/>
    <text x="100" y="345" text-anchor="middle" font-size="10" fill="white" font-family="sans-serif" opacity="0.8">FISH</text>
    <!-- Stall 2 (fruit) -->
    <rect x="280" y="360" width="90" height="70" fill="#BDC3C7"/>
    <rect x="270" y="340" width="110" height="20" rx="2" fill="#F1C40F"/>
    <rect x="270" y="330" width="110" height="12" rx="2" fill="white" opacity="0.3"/>
    <!-- Stall 3 -->
    <rect x="520" y="345" width="110" height="85" fill="#BDC3C7"/>
    <rect x="510" y="325" width="130" height="20" rx="2" fill="#2ECC71"/>
    <rect x="510" y="315" width="130" height="12" rx="2" fill="white" opacity="0.3"/>
  </g>
  <!-- Hanging banners -->
  <g>
    <rect x="180" y="300" width="30" height="50" rx="2" fill="#E74C3C" opacity="0.6"/>
    <rect x="420" y="310" width="25" height="40" rx="2" fill="#F1C40F" opacity="0.6"/>
    <rect x="680" y="305" width="28" height="45" rx="2" fill="#3498DB" opacity="0.6"/>
  </g>
  <!-- Boxes and crates -->
  <g fill="#C9A96E">
    <rect x="160" y="400" width="20" height="20" rx="1"/>
    <rect x="165" y="380" width="18" height="20" rx="1"/>
    <rect x="640" y="400" width="25" height="25" rx="1"/>
    <rect x="670" y="405" width="20" height="20" rx="1"/>
  </g>
  <!-- Awning stripes -->
  <g opacity="0.5">
    <line x1="50" y1="335" x2="60" y2="335" stroke="white" stroke-width="3"/>
    <line x1="70" y1="335" x2="80" y2="335" stroke="white" stroke-width="3"/>
    <line x1="90" y1="335" x2="100" y2="335" stroke="white" stroke-width="3"/>
    <line x1="110" y1="335" x2="120" y2="335" stroke="white" stroke-width="3"/>
    <line x1="130" y1="335" x2="140" y2="335" stroke="white" stroke-width="3"/>
  </g>
</svg>

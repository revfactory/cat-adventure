<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Main rooftop surface -->
  <rect x="0" y="520" width="800" height="80" fill="#7F8C8D"/>
  <rect x="0" y="520" width="800" height="8" fill="#95A5A6"/>
  <!-- Edge railing -->
  <g stroke="#5D6D7E" stroke-width="2">
    <line x1="0" y1="510" x2="800" y2="510"/>
    <line x1="0" y1="520" x2="800" y2="520"/>
  </g>
  <g fill="#5D6D7E">
    <rect x="40" y="505" width="4" height="20"/>
    <rect x="120" y="505" width="4" height="20"/>
    <rect x="200" y="505" width="4" height="20"/>
    <rect x="280" y="505" width="4" height="20"/>
    <rect x="360" y="505" width="4" height="20"/>
    <rect x="440" y="505" width="4" height="20"/>
    <rect x="520" y="505" width="4" height="20"/>
    <rect x="600" y="505" width="4" height="20"/>
    <rect x="680" y="505" width="4" height="20"/>
    <rect x="760" y="505" width="4" height="20"/>
  </g>
  <!-- Ventilation pipes -->
  <g fill="#95A5A6">
    <rect x="100" y="490" width="8" height="35" rx="4"/>
    <rect x="300" y="485" width="10" height="40" rx="5"/>
    <rect x="600" y="492" width="8" height="33" rx="4"/>
  </g>
  <!-- Cracks in rooftop -->
  <g stroke="#6C7A85" stroke-width="0.8" opacity="0.4">
    <path d="M200 525 L220 540 L210 560"/>
    <path d="M500 520 L510 535 L505 550"/>
  </g>
  <!-- Wind effect lines (strong wind) -->
  <g stroke="white" stroke-width="1" opacity="0.15">
    <path d="M0 440 Q100 435 200 440 Q300 445 400 440" fill="none"/>
    <path d="M200 460 Q300 455 400 460 Q500 465 600 460" fill="none"/>
    <path d="M400 480 Q500 475 600 480 Q700 485 800 480" fill="none"/>
  </g>
</svg>

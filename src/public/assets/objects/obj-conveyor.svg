<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 20">
  <g id="obj-conveyor">
    <!-- Side frame -->
    <rect x="0" y="0" width="80" height="20" rx="8" fill="#5D6D7E" stroke="#4A5A6A" stroke-width="1"/>
    <!-- Belt -->
    <rect x="4" y="2" width="72" height="6" rx="3" fill="#2C3E50"/>
    <!-- Belt treads -->
    <g stroke="#34495E" stroke-width="1.5">
      <line x1="10" y1="2" x2="8" y2="8"/>
      <line x1="18" y1="2" x2="16" y2="8"/>
      <line x1="26" y1="2" x2="24" y2="8"/>
      <line x1="34" y1="2" x2="32" y2="8"/>
      <line x1="42" y1="2" x2="40" y2="8"/>
      <line x1="50" y1="2" x2="48" y2="8"/>
      <line x1="58" y1="2" x2="56" y2="8"/>
      <line x1="66" y1="2" x2="64" y2="8"/>
      <line x1="74" y1="2" x2="72" y2="8"/>
    </g>
    <!-- Rollers -->
    <circle cx="8" cy="14" r="4" fill="#7F8C8D" stroke="#5D6D7E" stroke-width="0.8"/>
    <circle cx="8" cy="14" r="1.5" fill="#4A5A6A"/>
    <circle cx="72" cy="14" r="4" fill="#7F8C8D" stroke="#5D6D7E" stroke-width="0.8"/>
    <circle cx="72" cy="14" r="1.5" fill="#4A5A6A"/>
    <circle cx="40" cy="14" r="3" fill="#7F8C8D" stroke="#5D6D7E" stroke-width="0.5"/>
    <!-- Direction arrows -->
    <g fill="#F1C40F" opacity="0.6">
      <polygon points="20,5 24,3 24,7"/>
      <polygon points="40,5 44,3 44,7"/>
      <polygon points="60,5 64,3 64,7"/>
    </g>
  </g>
</svg>

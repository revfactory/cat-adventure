<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 60">
  <g id="obj-fountain">
    <!-- Base -->
    <ellipse cx="40" cy="55" rx="36" ry="5" fill="#95A5A6" stroke="#7F8C8D" stroke-width="1"/>
    <!-- Lower basin -->
    <path d="M8 50 Q8 40 16 38 L64 38 Q72 40 72 50" fill="#BDC3C7" stroke="#95A5A6" stroke-width="1"/>
    <!-- Water in basin -->
    <ellipse cx="40" cy="46" rx="28" ry="5" fill="#5DADE2" opacity="0.6"/>
    <!-- Pedestal -->
    <rect x="34" y="18" width="12" height="22" rx="2" fill="#BDC3C7" stroke="#95A5A6" stroke-width="0.8"/>
    <!-- Upper bowl -->
    <path d="M28 20 Q28 14 34 12 L46 12 Q52 14 52 20" fill="#BDC3C7" stroke="#95A5A6" stroke-width="0.8"/>
    <ellipse cx="40" cy="17" rx="12" ry="3" fill="#5DADE2" opacity="0.5"/>
    <!-- Water jet -->
    <path d="M40 12 Q40 2 40 0" stroke="#5DADE2" stroke-width="2" fill="none" opacity="0.7"/>
    <!-- Water drops -->
    <g fill="#5DADE2" opacity="0.5">
      <circle cx="36" cy="6" r="1"/>
      <circle cx="44" cy="4" r="0.8"/>
      <circle cx="32" cy="26" r="1.2"/>
      <circle cx="48" cy="24" r="1"/>
      <circle cx="38" cy="28" r="0.8"/>
    </g>
  </g>
</svg>

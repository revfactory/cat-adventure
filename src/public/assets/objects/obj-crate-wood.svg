<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <g id="obj-crate-wood">
    <rect x="1" y="1" width="38" height="38" rx="2" fill="#8B6914" stroke="#6B4F10" stroke-width="1.5"/>
    <!-- Planks -->
    <line x1="1" y1="10" x2="39" y2="10" stroke="#6B4F10" stroke-width="1"/>
    <line x1="1" y1="20" x2="39" y2="20" stroke="#6B4F10" stroke-width="1"/>
    <line x1="1" y1="30" x2="39" y2="30" stroke="#6B4F10" stroke-width="1"/>
    <!-- Cross braces -->
    <line x1="4" y1="4" x2="36" y2="36" stroke="#A0844A" stroke-width="2"/>
    <line x1="36" y1="4" x2="4" y2="36" stroke="#A0844A" stroke-width="2"/>
    <!-- Nails -->
    <g fill="#BDC3C7">
      <circle cx="5" cy="5" r="1.2"/>
      <circle cx="35" cy="5" r="1.2"/>
      <circle cx="5" cy="35" r="1.2"/>
      <circle cx="35" cy="35" r="1.2"/>
      <circle cx="20" cy="20" r="1.2"/>
    </g>
    <!-- Wood grain -->
    <g stroke="#7A5B10" stroke-width="0.4" opacity="0.3">
      <path d="M4 5 Q12 3 20 5 Q28 7 36 5"/>
      <path d="M4 15 Q12 13 20 15 Q28 17 36 15"/>
      <path d="M4 25 Q12 23 20 25 Q28 27 36 25"/>
      <path d="M4 35 Q12 33 20 35 Q28 37 36 35"/>
    </g>
  </g>
</svg>

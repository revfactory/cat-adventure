<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <g id="ally-black">
    <!-- Tail (long) -->
    <path d="M17 31 Q8 28 6 22 Q4 14 8 10 Q9 8 10 10" fill="none" stroke="#2C3E50" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Back legs -->
    <rect x="17" y="35" width="4" height="7" rx="2" fill="#1A252F"/>
    <rect x="27" y="35" width="4" height="7" rx="2" fill="#1A252F"/>
    <ellipse cx="19" cy="42.5" rx="2.5" ry="1.2" fill="#2C3E50"/>
    <ellipse cx="29" cy="42.5" rx="2.5" ry="1.2" fill="#2C3E50"/>
    <!-- Body (sleek) -->
    <ellipse cx="24" cy="30" rx="9" ry="6" fill="#2C3E50"/>
    <ellipse cx="24" cy="32" rx="4.5" ry="3" fill="#34495E"/>
    <!-- Front legs -->
    <rect x="18" y="34" width="3.5" height="7.5" rx="1.8" fill="#2C3E50"/>
    <rect x="27" y="34" width="3.5" height="7.5" rx="1.8" fill="#2C3E50"/>
    <ellipse cx="19.8" cy="42" rx="2.2" ry="1.2" fill="#34495E"/>
    <ellipse cx="28.8" cy="42" rx="2.2" ry="1.2" fill="#34495E"/>
    <!-- Head -->
    <g id="cat-head">
      <ellipse cx="24" cy="14" rx="10" ry="9.5" fill="#2C3E50"/>
      <!-- Ears -->
      <polygon points="15,8 12,1 18,5" fill="#2C3E50"/>
      <polygon points="33,8 36,1 30,5" fill="#2C3E50"/>
      <polygon points="15.5,7.5 13.5,3 17,5.5" fill="#1A252F"/>
      <polygon points="32.5,7.5 34.5,3 31,5.5" fill="#1A252F"/>
      <!-- Big golden eyes -->
      <ellipse cx="19" cy="13" rx="3.5" ry="4" fill="#F1C40F"/>
      <ellipse cx="29" cy="13" rx="3.5" ry="4" fill="#F1C40F"/>
      <ellipse cx="19.5" cy="13" rx="1.8" ry="2.8" fill="#2C3E50"/>
      <ellipse cx="29.5" cy="13" rx="1.8" ry="2.8" fill="#2C3E50"/>
      <circle cx="20.3" cy="11.8" r="0.8" fill="#F1C40F" opacity="0.6"/>
      <circle cx="30.3" cy="11.8" r="0.8" fill="#F1C40F" opacity="0.6"/>
      <!-- Nose -->
      <ellipse cx="24" cy="17.5" rx="1.2" ry="0.8" fill="#1A252F"/>
      <path d="M22.5 18.5 Q24 19.5 25.5 18.5" fill="none" stroke="#1A252F" stroke-width="0.7"/>
      <!-- Whiskers -->
      <g stroke="#34495E" stroke-width="0.5" opacity="0.5">
        <line x1="12" y1="16" x2="17" y2="17"/>
        <line x1="12" y1="18" x2="17" y2="17.5"/>
        <line x1="31" y1="17" x2="36" y2="16"/>
        <line x1="31" y1="17.5" x2="36" y2="18"/>
      </g>
    </g>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 44">
  <defs>
    <linearGradient id="cat-body-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF8C42"/>
      <stop offset="100%" stop-color="#E8792F"/>
    </linearGradient>
  </defs>
  <g id="cat-jump">
    <!-- Tail up -->
    <path d="M18 32 Q12 28 10 22 Q9 16 12 12" fill="none" stroke="#FF8C42" stroke-width="3" stroke-linecap="round"/>
    <!-- Back legs (stretched down) -->
    <g id="cat-legs-back">
      <rect x="17" y="36" width="5" height="8" rx="2.5" fill="#E06B1F" transform="rotate(10 19 36)"/>
      <rect x="26" y="36" width="5" height="8" rx="2.5" fill="#E06B1F" transform="rotate(-10 28 36)"/>
      <ellipse cx="20" cy="44" rx="2.5" ry="1.3" fill="#FFF5E6"/>
      <ellipse cx="27" cy="44" rx="2.5" ry="1.3" fill="#FFF5E6"/>
    </g>
    <!-- Body stretched vertically -->
    <ellipse id="cat-body" cx="24" cy="30" rx="9" ry="7.5" fill="url(#cat-body-grad)"/>
    <ellipse cx="24" cy="32" rx="5.5" ry="4" fill="#FFF5E6"/>
    <!-- Stripes -->
    <path d="M20 26 Q24 24 28 26" fill="none" stroke="#E06B1F" stroke-width="1" opacity="0.6"/>
    <!-- Front legs (reaching up) -->
    <g id="cat-legs-front">
      <rect x="16" y="24" width="4.5" height="8" rx="2.2" fill="#FF8C42" transform="rotate(-30 18 28)"/>
      <rect x="27" y="24" width="4.5" height="8" rx="2.2" fill="#FF8C42" transform="rotate(30 29 28)"/>
      <ellipse cx="13" cy="24" rx="2.5" ry="1.3" fill="#FFF5E6"/>
      <ellipse cx="35" cy="24" rx="2.5" ry="1.3" fill="#FFF5E6"/>
    </g>
    <!-- Head -->
    <g id="cat-head">
      <ellipse cx="24" cy="14" rx="11" ry="10" fill="#FF8C42"/>
      <polygon points="15,8 12,1 18,5" fill="#FF8C42"/>
      <polygon points="33,8 36,1 30,5" fill="#FF8C42"/>
      <polygon points="15.5,7.5 13,2.5 17.5,5.5" fill="#FFB89A"/>
      <polygon points="32.5,7.5 35,2.5 30.5,5.5" fill="#FFB89A"/>
      <!-- Excited eyes -->
      <g id="cat-eyes">
        <ellipse cx="19" cy="12.5" rx="3.5" ry="4" fill="white"/>
        <ellipse cx="29" cy="12.5" rx="3.5" ry="4" fill="white"/>
        <ellipse cx="19" cy="12.5" rx="2.8" ry="3.2" fill="#4ECDC4"/>
        <ellipse cx="29" cy="12.5" rx="2.8" ry="3.2" fill="#4ECDC4"/>
        <ellipse cx="19.5" cy="12" rx="1.5" ry="2" fill="#2C3E50"/>
        <ellipse cx="29.5" cy="12" rx="1.5" ry="2" fill="#2C3E50"/>
        <circle cx="20.5" cy="11" r="0.8" fill="white"/>
        <circle cx="30.5" cy="11" r="0.8" fill="white"/>
      </g>
      <ellipse cx="24" cy="17" rx="1.5" ry="1" fill="#FF6B9D"/>
      <path d="M22.5 18 Q24 19 25.5 18" fill="none" stroke="#E06B1F" stroke-width="0.8"/>
      <g stroke="#E06B1F" stroke-width="0.5" opacity="0.7">
        <line x1="12" y1="14.5" x2="17" y2="15.5"/>
        <line x1="12" y1="16.5" x2="17" y2="16.5"/>
        <line x1="31" y1="15.5" x2="36" y2="14.5"/>
        <line x1="31" y1="16.5" x2="36" y2="16.5"/>
      </g>
    </g>
  </g>
</svg>

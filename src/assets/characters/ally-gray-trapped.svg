<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <g id="ally-gray-trapped">
    <!-- Cardboard boxes around -->
    <rect x="2" y="20" width="44" height="26" rx="2" fill="#C9A96E" stroke="#A0844A" stroke-width="1"/>
    <line x1="2" y1="32" x2="46" y2="32" stroke="#A0844A" stroke-width="0.5" stroke-dasharray="3 2"/>
    <line x1="24" y1="20" x2="24" y2="46" stroke="#A0844A" stroke-width="0.5" stroke-dasharray="3 2"/>
    <!-- Cat peeking out -->
    <g id="cat-head" transform="translate(0 2)">
      <ellipse cx="24" cy="18" rx="10" ry="9" fill="#95A5A6"/>
      <!-- Ears -->
      <polygon points="16,12 13,5 19,9" fill="#95A5A6"/>
      <polygon points="32,11 34,5 29,9" fill="#95A5A6"/>
      <polygon points="16.5,11.5 14,6.5 18.5,9.5" fill="#BDC3C7"/>
      <!-- Scared big eyes -->
      <ellipse cx="19.5" cy="16" rx="3.5" ry="4" fill="white"/>
      <ellipse cx="28.5" cy="16" rx="3.5" ry="4" fill="white"/>
      <ellipse cx="19.5" cy="16.5" rx="2.5" ry="3" fill="#27AE60"/>
      <ellipse cx="28.5" cy="16.5" rx="2.5" ry="3" fill="#27AE60"/>
      <circle cx="19.5" cy="16.5" r="1.8" fill="#2C3E50"/>
      <circle cx="28.5" cy="16.5" r="1.8" fill="#2C3E50"/>
      <circle cx="20.3" cy="15.5" r="0.7" fill="white"/>
      <circle cx="29.3" cy="15.5" r="0.7" fill="white"/>
      <!-- Worried expression -->
      <ellipse cx="24" cy="20.5" rx="1.3" ry="0.8" fill="#FF6B9D"/>
      <path d="M22 22 Q24 21 26 22" fill="none" stroke="#7F8C8D" stroke-width="0.8"/>
      <!-- Sweat -->
      <path d="M33 10 Q34 7 33 5 Q35 7 33 10Z" fill="#5DADE2" opacity="0.6"/>
    </g>
    <!-- Paws reaching out -->
    <ellipse cx="16" cy="21" rx="3" ry="2" fill="#ECF0F1"/>
    <ellipse cx="32" cy="21" rx="3" ry="2" fill="#ECF0F1"/>
  </g>
</svg>

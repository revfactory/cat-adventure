<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 36">
  <g id="enemy-bulldog">
    <!-- Tail (tiny) -->
    <path d="M6 16 Q3 14 4 12" fill="none" stroke="#D4A574" stroke-width="2" stroke-linecap="round"/>
    <!-- Back legs (short, stocky) -->
    <rect x="7" y="26" width="6" height="7" rx="3" fill="#C49A6C"/>
    <rect x="27" y="26" width="6" height="7" rx="3" fill="#C49A6C"/>
    <ellipse cx="10" cy="33.5" rx="3.5" ry="1.5" fill="#D4A574"/>
    <ellipse cx="30" cy="33.5" rx="3.5" ry="1.5" fill="#D4A574"/>
    <!-- Body (fat, round) -->
    <ellipse cx="20" cy="20" rx="13" ry="10" fill="#D4A574"/>
    <ellipse cx="20" cy="23" rx="9" ry="6" fill="#E8C9A8"/>
    <!-- Spike collar -->
    <g id="collar">
      <rect x="12" y="12" width="16" height="4" rx="2" fill="#E74C3C"/>
      <!-- Spikes -->
      <polygon points="14,12 15,9 16,12" fill="#BDC3C7"/>
      <polygon points="18,12 19,9 20,12" fill="#BDC3C7"/>
      <polygon points="22,12 23,9 24,12" fill="#BDC3C7"/>
      <polygon points="26,12 27,9 28,12" fill="#BDC3C7"/>
    </g>
    <!-- Front legs -->
    <rect x="10" y="25" width="5.5" height="7.5" rx="2.8" fill="#D4A574"/>
    <rect x="24.5" y="25" width="5.5" height="7.5" rx="2.8" fill="#D4A574"/>
    <ellipse cx="12.8" cy="33" rx="3.2" ry="1.5" fill="#E8C9A8"/>
    <ellipse cx="27.2" cy="33" rx="3.2" ry="1.5" fill="#E8C9A8"/>
    <!-- Head -->
    <g id="bulldog-head">
      <ellipse cx="20" cy="10" rx="12" ry="8" fill="#D4A574"/>
      <!-- Wrinkles -->
      <path d="M14 8 Q16 6 18 8" fill="none" stroke="#C49A6C" stroke-width="0.8"/>
      <path d="M22 8 Q24 6 26 8" fill="none" stroke="#C49A6C" stroke-width="0.8"/>
      <path d="M16 10 Q20 9 24 10" fill="none" stroke="#C49A6C" stroke-width="0.8"/>
      <!-- Small angry eyes -->
      <circle cx="15" cy="8" r="2.5" fill="white"/>
      <circle cx="25" cy="8" r="2.5" fill="white"/>
      <circle cx="15.5" cy="8" r="1.5" fill="#2C3E50"/>
      <circle cx="25.5" cy="8" r="1.5" fill="#2C3E50"/>
      <!-- Angry eyebrows -->
      <line x1="12" y1="5" x2="17" y2="6" stroke="#C49A6C" stroke-width="2" stroke-linecap="round"/>
      <line x1="28" y1="5" x2="23" y2="6" stroke="#C49A6C" stroke-width="2" stroke-linecap="round"/>
      <!-- Big nose -->
      <ellipse cx="20" cy="12" rx="3" ry="2" fill="#8B6914"/>
      <!-- Underbite jaw -->
      <path d="M13 14 Q20 18 27 14" fill="#C49A6C"/>
      <!-- Teeth -->
      <rect x="16" y="13.5" width="2" height="2.5" rx="0.5" fill="white"/>
      <rect x="22" y="13.5" width="2" height="2.5" rx="0.5" fill="white"/>
      <!-- Drool -->
      <path d="M18 16 Q17.5 19 18 20" fill="none" stroke="#5DADE2" stroke-width="0.8" opacity="0.6"/>
    </g>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <g id="ally-siamese-trapped">
    <!-- Cage (boss's cage) -->
    <rect x="8" y="6" width="32" height="36" rx="2" fill="none" stroke="#5D6D7E" stroke-width="2"/>
    <!-- Vertical bars -->
    <g stroke="#7F8C8D" stroke-width="1.5">
      <line x1="12" y1="6" x2="12" y2="42"/>
      <line x1="16" y1="6" x2="16" y2="42"/>
      <line x1="20" y1="6" x2="20" y2="42"/>
      <line x1="24" y1="6" x2="24" y2="42"/>
      <line x1="28" y1="6" x2="28" y2="42"/>
      <line x1="32" y1="6" x2="32" y2="42"/>
      <line x1="36" y1="6" x2="36" y2="42"/>
    </g>
    <!-- Horizontal bars -->
    <line x1="8" y1="6" x2="40" y2="6" stroke="#5D6D7E" stroke-width="2"/>
    <line x1="8" y1="24" x2="40" y2="24" stroke="#5D6D7E" stroke-width="1.5"/>
    <line x1="8" y1="42" x2="40" y2="42" stroke="#5D6D7E" stroke-width="2"/>
    <!-- Lock -->
    <circle cx="8" cy="24" r="3" fill="#F1C40F" stroke="#E67E22" stroke-width="1"/>
    <rect x="6.5" y="23" width="3" height="2" rx="0.5" fill="#E67E22"/>
    <!-- Cat inside cage -->
    <g transform="translate(2 4)">
      <!-- Body sitting -->
      <ellipse cx="22" cy="30" rx="7" ry="5" fill="#F5E6CC"/>
      <ellipse cx="22" cy="32" rx="4" ry="2.5" fill="#FFF5E6"/>
      <!-- Legs tucked -->
      <ellipse cx="17" cy="34" rx="2.5" ry="1.5" fill="#8B7355"/>
      <ellipse cx="27" cy="34" rx="2.5" ry="1.5" fill="#8B7355"/>
      <!-- Head -->
      <ellipse cx="22" cy="20" rx="8" ry="7.5" fill="#F5E6CC"/>
      <ellipse cx="22" cy="22" rx="5.5" ry="3.5" fill="#8B7355" opacity="0.4"/>
      <!-- Ears -->
      <polygon points="16,15 14,9 18,13" fill="#8B7355"/>
      <polygon points="28,15 30,9 26,13" fill="#8B7355"/>
      <!-- Dignified but worried eyes -->
      <ellipse cx="18" cy="19" rx="2.8" ry="3" fill="white"/>
      <ellipse cx="26" cy="19" rx="2.8" ry="3" fill="white"/>
      <ellipse cx="18" cy="19" rx="2" ry="2.3" fill="#5DADE2"/>
      <ellipse cx="26" cy="19" rx="2" ry="2.3" fill="#5DADE2"/>
      <circle cx="18" cy="19" r="1.3" fill="#2C3E50"/>
      <circle cx="26" cy="19" r="1.3" fill="#2C3E50"/>
      <circle cx="18.5" cy="18" r="0.6" fill="white"/>
      <circle cx="26.5" cy="18" r="0.6" fill="white"/>
      <ellipse cx="22" cy="23" rx="1" ry="0.6" fill="#6B5740"/>
      <path d="M20.5 24 Q22 24.5 23.5 24" fill="none" stroke="#8B7355" stroke-width="0.7"/>
      <!-- Tail wrapped around body -->
      <path d="M29 30 Q32 28 30 26 Q28 24 30 22" fill="none" stroke="#8B7355" stroke-width="2" stroke-linecap="round"/>
    </g>
  </g>
</svg>

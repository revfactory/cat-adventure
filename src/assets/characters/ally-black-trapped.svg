<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <g id="ally-black-trapped">
    <!-- Birdhouse cage -->
    <rect x="12" y="4" width="24" height="28" rx="3" fill="#8B6914" stroke="#6B4F10" stroke-width="1.5"/>
    <rect x="14" y="6" width="20" height="24" rx="2" fill="#2C3E50" opacity="0.3"/>
    <!-- Bars -->
    <line x1="18" y1="4" x2="18" y2="32" stroke="#6B4F10" stroke-width="1.5"/>
    <line x1="24" y1="4" x2="24" y2="32" stroke="#6B4F10" stroke-width="1.5"/>
    <line x1="30" y1="4" x2="30" y2="32" stroke="#6B4F10" stroke-width="1.5"/>
    <!-- Roof -->
    <polygon points="10,6 24,0 38,6" fill="#A0844A" stroke="#6B4F10" stroke-width="1"/>
    <!-- Cat face peeking through bars -->
    <g transform="translate(0 4)">
      <ellipse cx="24" cy="16" rx="8" ry="7.5" fill="#2C3E50"/>
      <!-- Ears through bars -->
      <polygon points="18,11 16,5 20,9" fill="#2C3E50"/>
      <polygon points="30,11 32,5 28,9" fill="#2C3E50"/>
      <!-- Big golden eyes glowing -->
      <ellipse cx="20.5" cy="15" rx="3" ry="3.5" fill="#F1C40F"/>
      <ellipse cx="27.5" cy="15" rx="3" ry="3.5" fill="#F1C40F"/>
      <ellipse cx="21" cy="15" rx="1.5" ry="2.5" fill="#2C3E50"/>
      <ellipse cx="28" cy="15" rx="1.5" ry="2.5" fill="#2C3E50"/>
      <!-- Glow effect -->
      <ellipse cx="20.5" cy="15" rx="4" ry="4.5" fill="#F1C40F" opacity="0.15"/>
      <ellipse cx="27.5" cy="15" rx="4" ry="4.5" fill="#F1C40F" opacity="0.15"/>
      <ellipse cx="24" cy="20" rx="1.2" ry="0.7" fill="#1A252F"/>
      <path d="M22.5 21 Q24 22 25.5 21" fill="none" stroke="#1A252F" stroke-width="0.7"/>
    </g>
    <!-- Paw reaching through bar -->
    <ellipse cx="21" cy="30" rx="2" ry="1.5" fill="#34495E"/>
    <!-- Tree branch (support) -->
    <rect x="22" y="32" width="4" height="14" rx="2" fill="#6B4F10"/>
  </g>
</svg>

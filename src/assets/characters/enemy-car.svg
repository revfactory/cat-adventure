<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 32">
  <g id="enemy-car">
    <!-- Shadow -->
    <ellipse cx="32" cy="30" rx="28" ry="2" fill="#2C3E50" opacity="0.2"/>
    <!-- Body -->
    <rect x="4" y="10" width="56" height="16" rx="4" fill="#E74C3C"/>
    <!-- Roof -->
    <rect x="16" y="4" width="32" height="10" rx="3" fill="#C0392B"/>
    <!-- Windows -->
    <rect x="19" y="6" width="12" height="7" rx="1.5" fill="#5DADE2" opacity="0.6"/>
    <rect x="33" y="6" width="12" height="7" rx="1.5" fill="#5DADE2" opacity="0.6"/>
    <!-- Headlight eyes (angry) -->
    <g id="car-eyes">
      <circle cx="56" cy="16" r="4" fill="#F1C40F"/>
      <circle cx="56" cy="16" r="2.5" fill="white"/>
      <circle cx="56.5" cy="16" r="1.5" fill="#E74C3C"/>
      <!-- Angry brow -->
      <line x1="52" y1="11" x2="58" y2="13" stroke="#C0392B" stroke-width="2.5" stroke-linecap="round"/>
    </g>
    <!-- Tail light -->
    <circle cx="8" cy="16" r="3" fill="#E74C3C"/>
    <circle cx="8" cy="16" r="2" fill="#FF6B6B"/>
    <!-- Bumper (teeth) -->
    <rect x="56" y="20" width="8" height="4" rx="1" fill="#BDC3C7"/>
    <g fill="#95A5A6">
      <rect x="57" y="20.5" width="1.5" height="3" rx="0.5"/>
      <rect x="59.5" y="20.5" width="1.5" height="3" rx="0.5"/>
      <rect x="62" y="20.5" width="1.5" height="3" rx="0.5"/>
    </g>
    <!-- Front bumper teeth -->
    <rect x="0" y="20" width="8" height="4" rx="1" fill="#BDC3C7"/>
    <!-- Wheels -->
    <g id="car-wheels">
      <circle cx="16" cy="26" r="5" fill="#2C3E50"/>
      <circle cx="16" cy="26" r="3" fill="#7F8C8D"/>
      <circle cx="16" cy="26" r="1" fill="#2C3E50"/>
      <circle cx="48" cy="26" r="5" fill="#2C3E50"/>
      <circle cx="48" cy="26" r="3" fill="#7F8C8D"/>
      <circle cx="48" cy="26" r="1" fill="#2C3E50"/>
    </g>
    <!-- Exhaust -->
    <rect x="0" y="22" width="3" height="2" rx="1" fill="#7F8C8D"/>
  </g>
</svg>

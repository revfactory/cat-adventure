<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <g id="ally-siamese">
    <!-- Tail (elegant, long, dark tip) -->
    <path d="M18 31 Q10 28 7 22 Q5 16 8 12 Q9 10 10 12" fill="none" stroke="#F5E6CC" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M9 13 Q9 10 10 12" fill="none" stroke="#8B7355" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Back legs (dark points) -->
    <rect x="17" y="35" width="4" height="7.5" rx="2" fill="#8B7355"/>
    <rect x="27" y="35" width="4" height="7.5" rx="2" fill="#8B7355"/>
    <ellipse cx="19" cy="43" rx="2.5" ry="1.2" fill="#6B5740"/>
    <ellipse cx="29" cy="43" rx="2.5" ry="1.2" fill="#6B5740"/>
    <!-- Body (elegant, slim) -->
    <ellipse cx="24" cy="30" rx="9" ry="6" fill="#F5E6CC"/>
    <ellipse cx="24" cy="32" rx="5" ry="3" fill="#FFF5E6"/>
    <!-- Front legs (dark points) -->
    <rect x="18" y="34" width="3.5" height="7.5" rx="1.8" fill="#8B7355"/>
    <rect x="27" y="34" width="3.5" height="7.5" rx="1.8" fill="#8B7355"/>
    <ellipse cx="19.8" cy="42" rx="2.2" ry="1.2" fill="#6B5740"/>
    <ellipse cx="28.8" cy="42" rx="2.2" ry="1.2" fill="#6B5740"/>
    <!-- Head -->
    <g id="cat-head">
      <ellipse cx="24" cy="14" rx="10" ry="9.5" fill="#F5E6CC"/>
      <!-- Dark face mask -->
      <ellipse cx="24" cy="16" rx="7" ry="5" fill="#8B7355" opacity="0.5"/>
      <!-- Ears (pointed, dark) -->
      <polygon points="15,7 11,0 18,4" fill="#8B7355"/>
      <polygon points="33,7 37,0 30,4" fill="#8B7355"/>
      <polygon points="15.5,7 12.5,2 17.5,4.5" fill="#6B5740"/>
      <polygon points="32.5,7 35.5,2 30.5,4.5" fill="#6B5740"/>
      <!-- Sky blue eyes -->
      <ellipse cx="19" cy="13" rx="3.2" ry="3.8" fill="white"/>
      <ellipse cx="29" cy="13" rx="3.2" ry="3.8" fill="white"/>
      <ellipse cx="19" cy="13" rx="2.5" ry="3" fill="#5DADE2"/>
      <ellipse cx="29" cy="13" rx="2.5" ry="3" fill="#5DADE2"/>
      <ellipse cx="19.5" cy="12.5" rx="1.3" ry="2" fill="#2C3E50"/>
      <ellipse cx="29.5" cy="12.5" rx="1.3" ry="2" fill="#2C3E50"/>
      <circle cx="20.3" cy="11.5" r="0.7" fill="white"/>
      <circle cx="30.3" cy="11.5" r="0.7" fill="white"/>
      <!-- Dark nose -->
      <ellipse cx="24" cy="17.5" rx="1.3" ry="0.9" fill="#6B5740"/>
      <path d="M22.5 18.5 Q24 19.5 25.5 18.5" fill="none" stroke="#8B7355" stroke-width="0.7"/>
      <!-- Whiskers -->
      <g stroke="#8B7355" stroke-width="0.5" opacity="0.5">
        <line x1="12" y1="16" x2="17" y2="17"/>
        <line x1="12" y1="18" x2="17" y2="17.5"/>
        <line x1="31" y1="17" x2="36" y2="16"/>
        <line x1="31" y1="17.5" x2="36" y2="18"/>
      </g>
    </g>
  </g>
</svg>

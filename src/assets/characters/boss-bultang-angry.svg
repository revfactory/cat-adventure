<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 80">
  <defs>
    <filter id="anger-glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
      <feColorMatrix type="matrix" values="1.5 0 0 0 0.3  0 0.3 0 0 0  0 0 0.3 0 0  0 0 0 1 0"/>
    </filter>
  </defs>
  <g id="boss-bultang-angry">
    <!-- Anger aura -->
    <ellipse cx="48" cy="44" rx="38" ry="30" fill="#E74C3C" opacity="0.1"/>
    <!-- Tail (stiff, raised) -->
    <path d="M16 42 Q8 38 10 32" fill="none" stroke="#B5200A" stroke-width="4" stroke-linecap="round"/>
    <!-- Back legs -->
    <rect x="16" y="58" width="14" height="14" rx="7" fill="#9B1500"/>
    <rect x="58" y="58" width="14" height="14" rx="7" fill="#9B1500"/>
    <ellipse cx="23" cy="73" rx="8" ry="3" fill="#B5200A"/>
    <ellipse cx="65" cy="73" rx="8" ry="3" fill="#B5200A"/>
    <!-- Body (reddened) -->
    <ellipse cx="48" cy="48" rx="28" ry="18" fill="#B5200A"/>
    <ellipse cx="48" cy="54" rx="18" ry="10" fill="#D4754A"/>
    <!-- Torn vest (more torn) -->
    <g id="vest">
      <path d="M28 36 L22 58 Q35 62 48 60 Q61 62 74 58 L68 36 Q58 32 48 34 Q38 32 28 36Z" fill="#C0392B" opacity="0.8"/>
      <path d="M30 42 L36 52 L26 48" fill="#B5200A"/>
      <path d="M66 40 L72 50 L62 46" fill="#B5200A"/>
      <path d="M48 54 L56 62 L44 60" fill="#D4754A"/>
    </g>
    <!-- Spike collar -->
    <g id="collar">
      <rect x="30" y="28" width="36" height="8" rx="4" fill="#1A1A1A"/>
      <polygon points="34,28 36,22 38,28" fill="#BDC3C7"/>
      <polygon points="42,28 44,22 46,28" fill="#BDC3C7"/>
      <polygon points="50,28 52,22 54,28" fill="#BDC3C7"/>
      <polygon points="58,28 60,22 62,28" fill="#BDC3C7"/>
    </g>
    <!-- Front legs -->
    <rect x="22" y="56" width="12" height="15" rx="6" fill="#B5200A"/>
    <rect x="54" y="56" width="12" height="15" rx="6" fill="#B5200A"/>
    <ellipse cx="28" cy="72" rx="7" ry="3" fill="#D4754A"/>
    <ellipse cx="60" cy="72" rx="7" ry="3" fill="#D4754A"/>
    <!-- Head (reddened) -->
    <g id="boss-head-angry">
      <ellipse cx="48" cy="20" rx="22" ry="16" fill="#B5200A"/>
      <!-- Veins -->
      <path d="M30 10 Q32 6 34 10" stroke="#E74C3C" stroke-width="1" fill="none" opacity="0.6"/>
      <path d="M62 10 Q64 6 66 10" stroke="#E74C3C" stroke-width="1" fill="none" opacity="0.6"/>
      <!-- Wrinkles (deeper) -->
      <path d="M36 16 Q40 10 44 16" fill="none" stroke="#9B1500" stroke-width="2"/>
      <path d="M52 16 Q56 10 60 16" fill="none" stroke="#9B1500" stroke-width="2"/>
      <path d="M38 20 Q48 16 58 20" fill="none" stroke="#9B1500" stroke-width="1.5"/>
      <!-- Ears -->
      <polygon points="30,12 26,4 34,8" fill="#B5200A"/>
      <polygon points="66,12 70,4 62,8" fill="#B5200A"/>
      <!-- Scar (more visible) -->
      <line x1="34" y1="12" x2="42" y2="22" stroke="#FF0000" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
      <!-- Glowing angry eyes -->
      <circle cx="38" cy="17" r="5" fill="#FF0000" opacity="0.3"/>
      <circle cx="58" cy="17" r="5" fill="#FF0000" opacity="0.3"/>
      <circle cx="38" cy="17" r="4.5" fill="#FFFF00" opacity="0.4"/>
      <circle cx="58" cy="17" r="4.5" fill="#FFFF00" opacity="0.4"/>
      <circle cx="38" cy="17" r="3.5" fill="white"/>
      <circle cx="58" cy="17" r="3.5" fill="white"/>
      <circle cx="39" cy="17" r="2.5" fill="#FF0000"/>
      <circle cx="59" cy="17" r="2.5" fill="#FF0000"/>
      <circle cx="39" cy="17" r="1" fill="#2C3E50"/>
      <circle cx="59" cy="17" r="1" fill="#2C3E50"/>
      <!-- Furious eyebrows -->
      <line x1="30" y1="8" x2="42" y2="12" stroke="#9B1500" stroke-width="4" stroke-linecap="round"/>
      <line x1="66" y1="8" x2="54" y2="12" stroke="#9B1500" stroke-width="4" stroke-linecap="round"/>
      <!-- Nose (flaring) -->
      <ellipse cx="48" cy="23" rx="5.5" ry="4" fill="#7A0A00"/>
      <!-- Steam from nose -->
      <g opacity="0.5">
        <path d="M42 22 Q40 18 38 20" fill="none" stroke="white" stroke-width="1.5"/>
        <path d="M54 22 Q56 18 58 20" fill="none" stroke="white" stroke-width="1.5"/>
      </g>
      <!-- Jaw -->
      <path d="M32 26 Q48 38 64 26" fill="#9B1500"/>
      <!-- Bared teeth -->
      <rect x="36" y="25" width="3.5" height="5" rx="0.8" fill="white"/>
      <rect x="41" y="25" width="3.5" height="4.5" rx="0.8" fill="white"/>
      <rect x="46" y="25" width="3.5" height="5" rx="0.8" fill="white"/>
      <rect x="51" y="25" width="3.5" height="4.5" rx="0.8" fill="white"/>
      <rect x="56" y="25" width="3.5" height="5" rx="0.8" fill="white"/>
      <!-- Anger symbol -->
      <g transform="translate(68 2)" fill="#E74C3C">
        <path d="M0 4 L4 0 L4 4 L8 0 L8 4 L4 4 L4 8 L0 4Z" opacity="0.8"/>
      </g>
    </g>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 44">
  <defs>
    <linearGradient id="cat-body-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF8C42"/>
      <stop offset="100%" stop-color="#E8792F"/>
    </linearGradient>
  </defs>
  <g id="cat-wallslide">
    <!-- Tail sticking out -->
    <path d="M32 30 Q38 28 40 24 Q42 20 40 16" fill="none" stroke="#FF8C42" stroke-width="3" stroke-linecap="round"/>
    <!-- Body pressed against wall (left side) -->
    <ellipse id="cat-body" cx="20" cy="30" rx="8" ry="7" fill="url(#cat-body-grad)"/>
    <ellipse cx="22" cy="32" rx="5" ry="3.5" fill="#FFF5E6"/>
    <!-- Legs clinging to wall -->
    <!-- Front paws on wall -->
    <rect x="8" y="22" width="5" height="4" rx="2" fill="#FF8C42"/>
    <rect x="8" y="30" width="5" height="4" rx="2" fill="#FF8C42"/>
    <!-- Claws -->
    <g fill="#FFF5E6">
      <line x1="8" y1="23" x2="6" y2="22" stroke="#FFF5E6" stroke-width="1" stroke-linecap="round"/>
      <line x1="8" y1="24.5" x2="6" y2="23.5" stroke="#FFF5E6" stroke-width="1" stroke-linecap="round"/>
      <line x1="8" y1="31" x2="6" y2="30" stroke="#FFF5E6" stroke-width="1" stroke-linecap="round"/>
      <line x1="8" y1="32.5" x2="6" y2="31.5" stroke="#FFF5E6" stroke-width="1" stroke-linecap="round"/>
    </g>
    <!-- Back legs dangling -->
    <rect x="24" y="34" width="4.5" height="7" rx="2.2" fill="#E06B1F" transform="rotate(-5 26 34)"/>
    <rect x="18" y="35" width="4.5" height="7" rx="2.2" fill="#E06B1F" transform="rotate(5 20 35)"/>
    <ellipse cx="26" cy="41.5" rx="2.5" ry="1.2" fill="#FFF5E6"/>
    <ellipse cx="20" cy="42.5" rx="2.5" ry="1.2" fill="#FFF5E6"/>
    <!-- Head looking back -->
    <g id="cat-head" transform="translate(-4 0)">
      <ellipse cx="20" cy="14" rx="10.5" ry="9.5" fill="#FF8C42"/>
      <polygon points="12,8 9,1 15,5" fill="#FF8C42"/>
      <polygon points="28,8 31,1 25,5" fill="#FF8C42"/>
      <polygon points="12.5,7.5 10,2.5 14.5,5.5" fill="#FFB89A"/>
      <polygon points="27.5,7.5 30,2.5 24.5,5.5" fill="#FFB89A"/>
      <!-- Focused eyes -->
      <g id="cat-eyes">
        <ellipse cx="16" cy="13" rx="3.2" ry="3.5" fill="white"/>
        <ellipse cx="25" cy="13" rx="3.2" ry="3.5" fill="white"/>
        <ellipse cx="16" cy="13" rx="2.5" ry="2.8" fill="#4ECDC4"/>
        <ellipse cx="25" cy="13" rx="2.5" ry="2.8" fill="#4ECDC4"/>
        <ellipse cx="16" cy="13" rx="1.3" ry="1.8" fill="#2C3E50"/>
        <ellipse cx="25" cy="13" rx="1.3" ry="1.8" fill="#2C3E50"/>
        <circle cx="17" cy="12" r="0.7" fill="white"/>
        <circle cx="26" cy="12" r="0.7" fill="white"/>
      </g>
      <ellipse cx="20.5" cy="17" rx="1.3" ry="0.9" fill="#FF6B9D"/>
      <path d="M19 18.5 Q20.5 19.5 22 18.5" fill="none" stroke="#E06B1F" stroke-width="0.8"/>
      <g stroke="#E06B1F" stroke-width="0.5" opacity="0.7">
        <line x1="9" y1="15" x2="14" y2="16"/>
        <line x1="9" y1="17" x2="14" y2="17"/>
        <line x1="27" y1="16" x2="32" y2="15"/>
        <line x1="27" y1="17" x2="32" y2="17"/>
      </g>
    </g>
  </g>
</svg>

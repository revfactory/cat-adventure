<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 80">
  <g id="boss-bultang">
    <!-- Tail (small for body) -->
    <path d="M16 46 Q10 44 8 40" fill="none" stroke="#8B6914" stroke-width="4" stroke-linecap="round"/>
    <!-- Back legs (massive) -->
    <rect x="16" y="58" width="14" height="14" rx="7" fill="#7A5B10"/>
    <rect x="58" y="58" width="14" height="14" rx="7" fill="#7A5B10"/>
    <ellipse cx="23" cy="73" rx="8" ry="3" fill="#8B6914"/>
    <ellipse cx="65" cy="73" rx="8" ry="3" fill="#8B6914"/>
    <!-- Body (massive) -->
    <ellipse cx="48" cy="48" rx="28" ry="18" fill="#8B6914"/>
    <ellipse cx="48" cy="54" rx="18" ry="10" fill="#D4A574"/>
    <!-- Torn red vest -->
    <g id="vest">
      <path d="M28 36 L22 58 Q35 62 48 60 Q61 62 74 58 L68 36 Q58 32 48 34 Q38 32 28 36Z" fill="#E74C3C" opacity="0.85"/>
      <!-- Tears -->
      <path d="M30 45 L33 50 L28 48" fill="#8B6914"/>
      <path d="M66 42 L70 48 L64 46" fill="#8B6914"/>
      <path d="M50 56 L54 60 L48 59" fill="#D4A574"/>
    </g>
    <!-- Spike collar (black, bigger) -->
    <g id="collar">
      <rect x="30" y="28" width="36" height="8" rx="4" fill="#2C3E50"/>
      <polygon points="34,28 36,22 38,28" fill="#7F8C8D"/>
      <polygon points="42,28 44,22 46,28" fill="#7F8C8D"/>
      <polygon points="50,28 52,22 54,28" fill="#7F8C8D"/>
      <polygon points="58,28 60,22 62,28" fill="#7F8C8D"/>
    </g>
    <!-- Front legs -->
    <rect x="22" y="56" width="12" height="15" rx="6" fill="#8B6914"/>
    <rect x="54" y="56" width="12" height="15" rx="6" fill="#8B6914"/>
    <ellipse cx="28" cy="72" rx="7" ry="3" fill="#D4A574"/>
    <ellipse cx="60" cy="72" rx="7" ry="3" fill="#D4A574"/>
    <!-- Head -->
    <g id="boss-head">
      <ellipse cx="48" cy="20" rx="22" ry="16" fill="#8B6914"/>
      <!-- Heavy wrinkles -->
      <path d="M36 16 Q40 12 44 16" fill="none" stroke="#7A5B10" stroke-width="1.5"/>
      <path d="M52 16 Q56 12 60 16" fill="none" stroke="#7A5B10" stroke-width="1.5"/>
      <path d="M38 20 Q48 17 58 20" fill="none" stroke="#7A5B10" stroke-width="1.2"/>
      <path d="M34 14 Q38 10 42 14" fill="none" stroke="#7A5B10" stroke-width="1"/>
      <path d="M54 14 Q58 10 62 14" fill="none" stroke="#7A5B10" stroke-width="1"/>
      <!-- Ears (small for head) -->
      <polygon points="30,12 26,4 34,8" fill="#8B6914"/>
      <polygon points="66,12 70,4 62,8" fill="#8B6914"/>
      <!-- Scar on left eye -->
      <line x1="34" y1="12" x2="42" y2="22" stroke="#E74C3C" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
      <!-- Angry eyes -->
      <circle cx="38" cy="17" r="4.5" fill="white"/>
      <circle cx="58" cy="17" r="4.5" fill="white"/>
      <circle cx="39" cy="17" r="3" fill="#8B0000"/>
      <circle cx="59" cy="17" r="3" fill="#2C3E50"/>
      <circle cx="39.5" cy="16.5" r="1.5" fill="#2C3E50"/>
      <circle cx="59.5" cy="16.5" r="1.5" fill="#2C3E50"/>
      <!-- Heavy angry eyebrows -->
      <line x1="32" y1="10" x2="42" y2="13" stroke="#7A5B10" stroke-width="3.5" stroke-linecap="round"/>
      <line x1="64" y1="10" x2="54" y2="13" stroke="#7A5B10" stroke-width="3.5" stroke-linecap="round"/>
      <!-- Big nose -->
      <ellipse cx="48" cy="23" rx="5" ry="3.5" fill="#5D4E0E"/>
      <!-- Massive jaw -->
      <path d="M32 26 Q48 36 64 26" fill="#7A5B10"/>
      <!-- Teeth (underbite) -->
      <rect x="38" y="25" width="3.5" height="4" rx="0.8" fill="white"/>
      <rect x="44" y="25" width="3.5" height="4" rx="0.8" fill="white"/>
      <rect x="50" y="25" width="3.5" height="4" rx="0.8" fill="white"/>
      <rect x="56" y="25" width="3.5" height="4" rx="0.8" fill="white"/>
      <!-- Drool -->
      <path d="M42 30 Q41 35 42 38" fill="none" stroke="#5DADE2" stroke-width="1.2" opacity="0.5"/>
      <path d="M54 30 Q55 34 54 36" fill="none" stroke="#5DADE2" stroke-width="1" opacity="0.4"/>
    </g>
  </g>
</svg>

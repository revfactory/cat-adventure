<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <g id="item-boots">
    <!-- Left boot -->
    <g transform="translate(0 2)">
      <path d="M6 10 L6 22 L2 22 L2 26 L14 26 L14 22 L10 22 L10 10 Z" fill="#E74C3C" rx="2"/>
      <rect x="6" y="10" width="4" height="3" rx="1" fill="#C0392B"/>
      <!-- Sole -->
      <rect x="2" y="24" width="12" height="2" rx="1" fill="#7F8C8D"/>
      <!-- Wing (speed) -->
      <path d="M10 16 Q16 14 14 18 Q12 16 10 18Z" fill="#F1C40F"/>
      <!-- Laces -->
      <line x1="7" y1="14" x2="9" y2="14" stroke="white" stroke-width="0.5"/>
      <line x1="7" y1="16" x2="9" y2="16" stroke="white" stroke-width="0.5"/>
    </g>
    <!-- Right boot -->
    <g transform="translate(14 0)">
      <path d="M4 8 L4 20 L0 20 L0 24 L12 24 L12 20 L8 20 L8 8 Z" fill="#E74C3C"/>
      <rect x="4" y="8" width="4" height="3" rx="1" fill="#C0392B"/>
      <rect x="0" y="22" width="12" height="2" rx="1" fill="#7F8C8D"/>
      <path d="M8 14 Q14 12 12 16 Q10 14 8 16Z" fill="#F1C40F"/>
      <line x1="5" y1="12" x2="7" y2="12" stroke="white" stroke-width="0.5"/>
      <line x1="5" y1="14" x2="7" y2="14" stroke="white" stroke-width="0.5"/>
    </g>
    <!-- Speed lines -->
    <g stroke="#F1C40F" stroke-width="0.5" opacity="0.6">
      <line x1="0" y1="12" x2="4" y2="12"/>
      <line x1="0" y1="16" x2="3" y2="16"/>
      <line x1="0" y1="20" x2="2" y2="20"/>
    </g>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <defs>
    <linearGradient id="title-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF8C42"/>
      <stop offset="100%" stop-color="#E06B1F"/>
    </linearGradient>
    <filter id="title-shadow">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-color="#2C3E50" flood-opacity="0.3"/>
    </filter>
  </defs>
  <g filter="url(#title-shadow)">
    <!-- Main title -->
    <text x="200" y="55" text-anchor="middle" font-size="42" font-family="sans-serif" fill="url(#title-grad)" font-weight="bold" stroke="#E06B1F" stroke-width="1">냥이의 도시 대모험</text>
    <!-- Subtitle -->
    <text x="200" y="85" text-anchor="middle" font-size="16" font-family="sans-serif" fill="#4ECDC4" font-weight="bold" letter-spacing="4">MEOW CITY ADVENTURE</text>
  </g>
  <!-- Cat ears decoration on 냥 -->
  <g fill="#FF8C42">
    <polygon points="42,18 38,6 46,12" />
    <polygon points="58,18 54,6 62,12" />
    <polygon points="43,17 39.5,8 45.5,12.5" fill="#FFB89A"/>
    <polygon points="57,17 53.5,8 59.5,12.5" fill="#FFB89A"/>
  </g>
  <!-- Star decorations -->
  <g fill="#F1C40F" opacity="0.7">
    <polygon points="20,30 21.5,34 26,34.5 22.5,37 23.5,41.5 20,39 16.5,41.5 17.5,37 14,34.5 18.5,34" transform="scale(0.6) translate(-5 0)"/>
    <polygon points="20,30 21.5,34 26,34.5 22.5,37 23.5,41.5 20,39 16.5,41.5 17.5,37 14,34.5 18.5,34" transform="scale(0.5) translate(740 40)"/>
  </g>
  <!-- Paw prints -->
  <g fill="#FF8C42" opacity="0.2">
    <circle cx="330" cy="30" r="4"/>
    <circle cx="326" cy="24" r="2"/>
    <circle cx="330" cy="22" r="2"/>
    <circle cx="334" cy="24" r="2"/>
    <circle cx="70" cy="95" r="3.5"/>
    <circle cx="67" cy="90" r="1.8"/>
    <circle cx="70" cy="88" r="1.8"/>
    <circle cx="73" cy="90" r="1.8"/>
  </g>
  <!-- Version line -->
  <line x1="100" y1="100" x2="300" y2="100" stroke="#BDC3C7" stroke-width="0.5" opacity="0.5"/>
</svg>

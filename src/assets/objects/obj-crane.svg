<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 100">
  <g id="obj-crane">
    <!-- Base -->
    <rect x="10" y="85" width="30" height="15" rx="2" fill="#F1C40F" stroke="#D4AC0D" stroke-width="1.5"/>
    <!-- Vertical mast -->
    <rect x="22" y="10" width="8" height="78" fill="#F1C40F" stroke="#D4AC0D" stroke-width="1"/>
    <!-- Cross bracing -->
    <g stroke="#D4AC0D" stroke-width="0.8">
      <line x1="22" y1="20" x2="30" y2="35"/>
      <line x1="30" y1="20" x2="22" y2="35"/>
      <line x1="22" y1="40" x2="30" y2="55"/>
      <line x1="30" y1="40" x2="22" y2="55"/>
      <line x1="22" y1="60" x2="30" y2="75"/>
      <line x1="30" y1="60" x2="22" y2="75"/>
    </g>
    <!-- Jib (horizontal arm) -->
    <rect x="26" y="8" width="50" height="5" rx="1" fill="#F1C40F" stroke="#D4AC0D" stroke-width="1"/>
    <!-- Counter-jib -->
    <rect x="2" y="8" width="22" height="5" rx="1" fill="#F1C40F" stroke="#D4AC0D" stroke-width="1"/>
    <!-- Counter weight -->
    <rect x="2" y="13" width="10" height="8" rx="1" fill="#7F8C8D"/>
    <!-- Cable -->
    <line x1="60" y1="10" x2="60" y2="60" stroke="#2C3E50" stroke-width="1.5"/>
    <!-- Hook -->
    <g transform="translate(56 58)">
      <rect x="2" y="0" width="4" height="4" rx="1" fill="#BDC3C7"/>
      <path d="M0 4 Q0 12 4 12 Q8 12 8 4" fill="none" stroke="#BDC3C7" stroke-width="2"/>
    </g>
    <!-- Warning stripes -->
    <g fill="#2C3E50" opacity="0.3">
      <rect x="10" y="85" width="5" height="15"/>
      <rect x="20" y="85" width="5" height="15"/>
      <rect x="30" y="85" width="5" height="15"/>
    </g>
  </g>
</svg>

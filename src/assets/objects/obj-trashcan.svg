<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 40">
  <g id="obj-trashcan">
    <!-- Can body -->
    <rect x="3" y="10" width="24" height="28" rx="2" fill="#7F8C8D"/>
    <rect x="3" y="10" width="24" height="28" rx="2" fill="none" stroke="#5D6D7E" stroke-width="1"/>
    <!-- Ridges -->
    <line x1="3" y1="18" x2="27" y2="18" stroke="#5D6D7E" stroke-width="0.8"/>
    <line x1="3" y1="26" x2="27" y2="26" stroke="#5D6D7E" stroke-width="0.8"/>
    <!-- Lid -->
    <rect x="1" y="6" width="28" height="5" rx="2.5" fill="#95A5A6" stroke="#5D6D7E" stroke-width="0.8"/>
    <!-- Handle -->
    <rect x="12" y="3" width="6" height="4" rx="2" fill="#BDC3C7" stroke="#95A5A6" stroke-width="0.8"/>
    <!-- Dent -->
    <ellipse cx="18" cy="22" rx="4" ry="3" fill="#6C7A85" opacity="0.4"/>
    <!-- Shine -->
    <rect x="6" y="12" width="2" height="22" rx="1" fill="white" opacity="0.1"/>
  </g>
</svg>

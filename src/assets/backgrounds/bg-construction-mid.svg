<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Scaffolding structures -->
  <g stroke="#7F8C8D" stroke-width="2">
    <!-- Left scaffold -->
    <line x1="50" y1="200" x2="50" y2="500"/>
    <line x1="120" y1="200" x2="120" y2="500"/>
    <line x1="50" y1="250" x2="120" y2="250"/>
    <line x1="50" y1="320" x2="120" y2="320"/>
    <line x1="50" y1="390" x2="120" y2="390"/>
    <line x1="50" y1="460" x2="120" y2="460"/>
    <line x1="50" y1="250" x2="120" y2="320"/>
    <line x1="120" y1="250" x2="50" y2="320"/>
    <!-- Right scaffold -->
    <line x1="600" y1="180" x2="600" y2="500"/>
    <line x1="680" y1="180" x2="680" y2="500"/>
    <line x1="600" y1="230" x2="680" y2="230"/>
    <line x1="600" y1="310" x2="680" y2="310"/>
    <line x1="600" y1="390" x2="680" y2="390"/>
    <line x1="600" y1="470" x2="680" y2="470"/>
  </g>
  <!-- Planks on scaffold -->
  <g fill="#A0844A">
    <rect x="45" y="248" width="80" height="5" rx="1"/>
    <rect x="45" y="318" width="80" height="5" rx="1"/>
    <rect x="45" y="388" width="80" height="5" rx="1"/>
    <rect x="595" y="228" width="90" height="5" rx="1"/>
    <rect x="595" y="308" width="90" height="5" rx="1"/>
  </g>
  <!-- Warning signs -->
  <g>
    <polygon points="250,380 270,350 290,380" fill="#F1C40F" stroke="#2C3E50" stroke-width="2"/>
    <text x="270" y="376" text-anchor="middle" font-size="14" fill="#2C3E50" font-weight="bold">!</text>
    <polygon points="500,400 520,370 540,400" fill="#F1C40F" stroke="#2C3E50" stroke-width="2"/>
    <text x="520" y="396" text-anchor="middle" font-size="14" fill="#2C3E50" font-weight="bold">!</text>
  </g>
  <!-- Concrete mixer -->
  <g transform="translate(350 430)">
    <ellipse cx="20" cy="15" rx="20" ry="15" fill="#F1C40F"/>
    <rect x="35" y="5" width="15" height="8" rx="2" fill="#7F8C8D"/>
    <circle cx="10" cy="30" r="6" fill="#2C3E50"/>
    <circle cx="30" cy="30" r="6" fill="#2C3E50"/>
    <circle cx="10" cy="30" r="3" fill="#7F8C8D"/>
    <circle cx="30" cy="30" r="3" fill="#7F8C8D"/>
  </g>
  <!-- Steel beams -->
  <g fill="#95A5A6">
    <rect x="200" y="460" width="100" height="8" rx="1" transform="rotate(-5 250 464)"/>
    <rect x="450" y="440" width="80" height="8" rx="1" transform="rotate(3 490 444)"/>
  </g>
</svg>

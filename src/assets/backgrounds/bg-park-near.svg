<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Foreground grass -->
  <rect x="0" y="540" width="800" height="60" fill="#2ECC71"/>
  <rect x="0" y="540" width="800" height="10" fill="#27AE60"/>
  <!-- Grass blades -->
  <g stroke="#1E8449" stroke-width="1" opacity="0.4">
    <line x1="20" y1="540" x2="18" y2="530"/><line x1="60" y1="540" x2="62" y2="528"/>
    <line x1="120" y1="540" x2="118" y2="532"/><line x1="200" y1="540" x2="203" y2="529"/>
    <line x1="300" y1="540" x2="298" y2="531"/><line x1="400" y1="540" x2="402" y2="528"/>
    <line x1="500" y1="540" x2="497" y2="530"/><line x1="600" y1="540" x2="603" y2="529"/>
    <line x1="700" y1="540" x2="698" y2="532"/><line x1="780" y1="540" x2="782" y2="530"/>
  </g>
  <!-- Foreground lamp post -->
  <rect x="50" y="380" width="6" height="180" fill="#5D6D7E"/>
  <rect x="42" y="374" width="22" height="8" rx="4" fill="#7F8C8D"/>

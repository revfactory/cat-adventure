  </g>
  <g fill="#8B6914">
    <rect x="300" y="490" width="4" height="40" rx="1"/>
    <rect x="330" y="495" width="3" height="30" rx="1"/>
    <rect x="360" y="495" width="3" height="30" rx="1"/>
    <rect x="390" y="495" width="3" height="30" rx="1"/>
    <rect x="420" y="495" width="3" height="30" rx="1"/>
    <rect x="450" y="495" width="3" height="30" rx="1"/>
    <rect x="480" y="495" width="3" height="30" rx="1"/>
    <rect x="510" y="495" width="3" height="30" rx="1"/>
    <rect x="546" y="490" width="4" height="40" rx="1"/>
  </g>
  <!-- Dandelions -->
  <g>
    <line x1="680" y1="540" x2="680" y2="520" stroke="#27AE60" stroke-width="1"/>
    <circle cx="680" cy="518" r="4" fill="white" opacity="0.7"/>
    <line x1="720" y1="540" x2="722" y2="525" stroke="#27AE60" stroke-width="1"/>

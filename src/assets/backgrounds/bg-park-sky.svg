  </defs>
  <rect width="800" height="600" fill="url(#park-sky)"/>
  <!-- Sun -->
  <circle cx="650" cy="100" r="40" fill="#F1C40F" opacity="0.8"/>
  <circle cx="650" cy="100" r="35" fill="#F7DC6F"/>

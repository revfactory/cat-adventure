<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="alley-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2C3E50"/>
      <stop offset="40%" stop-color="#5D6D7E"/>
      <stop offset="100%" stop-color="#87CEEB"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#alley-sky)"/>
  <!-- Moon -->
  <circle cx="650" cy="80" r="30" fill="#F7DC6F" opacity="0.9"/>
  <circle cx="640" cy="75" r="28" fill="url(#alley-sky)"/>
  <!-- Stars -->
  <g fill="white" opacity="0.6">
    <circle cx="100" cy="50" r="1.5"/><circle cx="250" cy="30" r="1"/>
    <circle cx="400" cy="60" r="1.2"/><circle cx="550" cy="20" r="1.5"/>
    <circle cx="700" cy="45" r="1"/><circle cx="150" cy="100" r="0.8"/>
    <circle cx="350" cy="80" r="1.3"/><circle cx="500" cy="110" r="0.8"/>
    <circle cx="50" cy="140" r="1"/><circle cx="750" cy="120" r="1.2"/>
  </g>
  <!-- Clouds (dark) -->
  <g fill="#5D6D7E" opacity="0.3">
    <ellipse cx="200" cy="150" rx="80" ry="25"/>
    <ellipse cx="240" cy="145" rx="60" ry="20"/>
    <ellipse cx="600" cy="180" rx="70" ry="22"/>
    <ellipse cx="640" cy="175" rx="50" ry="18"/>
  </g>
</svg>

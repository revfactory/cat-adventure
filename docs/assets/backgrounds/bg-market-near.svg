<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Foreground wall/building edge -->
  <rect x="-10" y="280" width="80" height="320" fill="#7F8C8D"/>
  <rect x="740" y="300" width="80" height="300" fill="#7F8C8D"/>
  <!-- Street surface -->
  <rect x="0" y="560" width="800" height="40" fill="#ABB2B9"/>
  <!-- Fish stand detail -->
  <g transform="translate(100 480)">
    <rect x="0" y="0" width="80" height="40" fill="#BDC3C7" stroke="#95A5A6" stroke-width="1"/>
    <rect x="0" y="0" width="80" height="8" fill="#5DADE2" opacity="0.3"/>
    <!-- Fish display -->
    <ellipse cx="20" cy="20" rx="8" ry="4" fill="#5DADE2" opacity="0.6"/>
    <ellipse cx="45" cy="22" rx="7" ry="3.5" fill="#5DADE2" opacity="0.5"/>
    <ellipse cx="65" cy="20" rx="6" ry="3" fill="#85C1E9" opacity="0.6"/>
  </g>
  <!-- Hanging lanterns -->
  <g>
    <line x1="200" y1="300" x2="600" y2="300" stroke="#BDC3C7" stroke-width="1"/>
    <g fill="#E74C3C" opacity="0.6">
      <ellipse cx="280" cy="315" rx="8" ry="10"/>
      <ellipse cx="400" cy="318" rx="8" ry="10"/>
      <ellipse cx="520" cy="315" rx="8" ry="10"/>
    </g>
  </g>
  <!-- Barrel -->
  <g transform="translate(650 500)">
    <rect x="0" y="0" width="30" height="40" rx="4" fill="#8B6914" stroke="#6B4F10" stroke-width="1"/>
    <line x1="0" y1="10" x2="30" y2="10" stroke="#6B4F10" stroke-width="1"/>
    <line x1="0" y1="30" x2="30" y2="30" stroke="#6B4F10" stroke-width="1"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="construction-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F39C12"/>
      <stop offset="30%" stop-color="#E67E22"/>
      <stop offset="100%" stop-color="#87CEEB"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#construction-sky)"/>
  <!-- Late afternoon sun -->
  <circle cx="100" cy="120" r="45" fill="#F1C40F" opacity="0.6"/>
  <circle cx="100" cy="120" r="55" fill="#F1C40F" opacity="0.15"/>
  <!-- Clouds (warm toned) -->
  <g fill="#F5CBA7" opacity="0.5">
    <ellipse cx="300" cy="100" rx="70" ry="22"/>
    <ellipse cx="340" cy="95" rx="55" ry="18"/>
    <ellipse cx="600" cy="130" rx="60" ry="20"/>
    <ellipse cx="640" cy="126" rx="45" ry="16"/>
  </g>
</svg>

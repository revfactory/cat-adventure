<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Distant cranes -->
  <g stroke="#95A5A6" stroke-width="2" fill="none" opacity="0.3">
    <line x1="200" y1="400" x2="200" y2="150"/>
    <line x1="200" y1="150" x2="280" y2="150"/>
    <line x1="200" y1="150" x2="160" y2="150"/>
    <line x1="400" y1="420" x2="400" y2="180"/>
    <line x1="400" y1="180" x2="460" y2="180"/>
    <line x1="650" y1="400" x2="650" y2="200"/>
    <line x1="650" y1="200" x2="720" y2="200"/>
  </g>
  <!-- Unfinished buildings -->
  <g fill="#ABB2B9" opacity="0.35">
    <rect x="100" y="280" width="80" height="320"/>
    <rect x="300" y="300" width="100" height="300"/>
    <rect x="550" y="320" width="70" height="280"/>
    <rect x="700" y="290" width="60" height="310"/>
  </g>
  <!-- Exposed structure -->
  <g stroke="#BDC3C7" stroke-width="1" opacity="0.2">
    <line x1="100" y1="310" x2="180" y2="310"/>
    <line x1="100" y1="350" x2="180" y2="350"/>
    <line x1="120" y1="280" x2="120" y2="400"/>
    <line x1="160" y1="280" x2="160" y2="400"/>
  </g>
</svg>

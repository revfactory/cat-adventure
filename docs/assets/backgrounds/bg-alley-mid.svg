<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Mid buildings -->
  <g fill="#5D6D7E">
    <rect x="0" y="250" width="120" height="350"/>
    <rect x="140" y="220" width="100" height="380"/>
    <rect x="280" y="280" width="80" height="320"/>
    <rect x="380" y="200" width="130" height="400"/>
    <rect x="540" y="260" width="90" height="340"/>
    <rect x="660" y="230" width="140" height="370"/>
  </g>
  <!-- Windows -->
  <g fill="#F1C40F" opacity="0.4">
    <rect x="20" y="270" width="8" height="8" rx="1"/><rect x="50" y="270" width="8" height="8" rx="1"/>
    <rect x="80" y="270" width="8" height="8" rx="1"/><rect x="20" y="300" width="8" height="8" rx="1"/>
    <rect x="50" y="300" width="8" height="8" rx="1"/><rect x="80" y="300" width="8" height="8" rx="1"/>
    <rect x="160" y="240" width="8" height="8" rx="1"/><rect x="190" y="240" width="8" height="8" rx="1"/>
    <rect x="160" y="270" width="8" height="8" rx="1"/><rect x="190" y="270" width="8" height="8" rx="1"/>
    <rect x="400" y="220" width="8" height="8" rx="1"/><rect x="430" y="220" width="8" height="8" rx="1"/>
    <rect x="460" y="220" width="8" height="8" rx="1"/><rect x="400" y="250" width="8" height="8" rx="1"/>
    <rect x="680" y="250" width="8" height="8" rx="1"/><rect x="710" y="250" width="8" height="8" rx="1"/>
    <rect x="740" y="250" width="8" height="8" rx="1"/><rect x="680" y="280" width="8" height="8" rx="1"/>
  </g>
  <!-- Clotheslines -->
  <g stroke="#BDC3C7" stroke-width="0.8" opacity="0.5">
    <path d="M120 280 Q170 290 240 280" fill="none"/>
    <path d="M380 260 Q420 270 510 260" fill="none"/>
  </g>
  <!-- Clothes on lines -->
  <g fill="#E74C3C" opacity="0.4">
    <rect x="150" y="282" width="8" height="10" rx="1"/>
    <rect x="180" y="283" width="6" height="8" rx="1" fill="#3498DB"/>
    <rect x="420" y="262" width="8" height="10" rx="1"/>
    <rect x="460" y="263" width="6" height="8" rx="1" fill="#F1C40F"/>
  </g>
  <!-- Fire escapes -->
  <g stroke="#7F8C8D" stroke-width="1.5" fill="none">
    <rect x="100" y="310" width="16" height="6" rx="1"/>
    <rect x="100" y="340" width="16" height="6" rx="1"/>
    <line x1="108" y1="316" x2="108" y2="340"/>
  </g>
</svg>

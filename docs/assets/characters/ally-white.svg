<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <g id="ally-white">
    <!-- Tail (fluffy) -->
    <path d="M18 30 Q10 28 8 22 Q7 16 10 14" fill="none" stroke="#ECF0F1" stroke-width="4" stroke-linecap="round"/>
    <path d="M18 30 Q10 28 8 22 Q7 16 10 14" fill="none" stroke="#BDC3C7" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
    <!-- Back legs -->
    <rect x="17" y="35" width="5" height="7" rx="2.5" fill="#BDC3C7"/>
    <rect x="26" y="35" width="5" height="7" rx="2.5" fill="#BDC3C7"/>
    <ellipse cx="19.5" cy="42.5" rx="3" ry="1.5" fill="#ECF0F1"/>
    <ellipse cx="28.5" cy="42.5" rx="3" ry="1.5" fill="#ECF0F1"/>
    <!-- Body (slightly plump, fluffy) -->
    <ellipse cx="24" cy="30" rx="10.5" ry="7.5" fill="#ECF0F1"/>
    <ellipse cx="24" cy="32" rx="6.5" ry="4.5" fill="white"/>
    <!-- Fur texture -->
    <g stroke="#BDC3C7" stroke-width="0.5" opacity="0.3">
      <path d="M16 28 Q17 27 16.5 26"/>
      <path d="M32 28 Q31 27 31.5 26"/>
    </g>
    <!-- Front legs -->
    <rect x="17" y="34" width="4.5" height="7.5" rx="2.2" fill="#ECF0F1"/>
    <rect x="26.5" y="34" width="4.5" height="7.5" rx="2.2" fill="#ECF0F1"/>
    <ellipse cx="19.2" cy="42" rx="2.8" ry="1.5" fill="white"/>
    <ellipse cx="28.8" cy="42" rx="2.8" ry="1.5" fill="white"/>
    <!-- Head -->
    <g id="cat-head">
      <ellipse cx="24" cy="14" rx="11" ry="10" fill="#ECF0F1"/>
      <!-- Ears -->
      <polygon points="15,8 12,1 18,5" fill="#ECF0F1"/>
      <polygon points="33,8 36,1 30,5" fill="#ECF0F1"/>
      <polygon points="15.5,7.5 13,2.5 17.5,5.5" fill="#FFB89A"/>
      <polygon points="32.5,7.5 35,2.5 30.5,5.5" fill="#FFB89A"/>
      <!-- Blue eyes -->
      <ellipse cx="19" cy="13" rx="3.5" ry="3.8" fill="white"/>
      <ellipse cx="29" cy="13" rx="3.5" ry="3.8" fill="white"/>
      <ellipse cx="19" cy="13" rx="2.8" ry="3" fill="#3498DB"/>
      <ellipse cx="29" cy="13" rx="2.8" ry="3" fill="#3498DB"/>
      <ellipse cx="19.5" cy="12.5" rx="1.5" ry="2" fill="#2C3E50"/>
      <ellipse cx="29.5" cy="12.5" rx="1.5" ry="2" fill="#2C3E50"/>
      <circle cx="20.3" cy="11.5" r="0.8" fill="white"/>
      <circle cx="30.3" cy="11.5" r="0.8" fill="white"/>
      <!-- Pink nose -->
      <ellipse cx="24" cy="17" rx="1.5" ry="1" fill="#FF6B9D"/>
      <path d="M22.5 18.5 Q24 19.8 25.5 18.5" fill="none" stroke="#BDC3C7" stroke-width="0.8"/>
      <!-- Whiskers -->
      <g stroke="#BDC3C7" stroke-width="0.5" opacity="0.5">
        <line x1="12" y1="15" x2="17" y2="16"/>
        <line x1="12" y1="17" x2="17" y2="17"/>
        <line x1="31" y1="16" x2="36" y2="15"/>
        <line x1="31" y1="17" x2="36" y2="17"/>
      </g>
      <!-- Cheeks -->
      <circle cx="16" cy="17" r="2" fill="#FFB89A" opacity="0.25"/>
      <circle cx="32" cy="17" r="2" fill="#FFB89A" opacity="0.25"/>
    </g>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 44">
  <defs>
    <linearGradient id="cat-body-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF8C42"/>
      <stop offset="100%" stop-color="#E8792F"/>
    </linearGradient>
  </defs>
  <g id="cat-hurt">
    <!-- Tail drooped -->
    <path d="M18 34 Q14 36 12 38 Q10 40 12 42" fill="none" stroke="#FF8C42" stroke-width="3" stroke-linecap="round"/>
    <!-- Legs stiff -->
    <g id="cat-legs">
      <rect x="15" y="35" width="5" height="7" rx="2.5" fill="#E06B1F"/>
      <rect x="28" y="35" width="5" height="7" rx="2.5" fill="#E06B1F"/>
      <rect x="16" y="34" width="4.5" height="7.5" rx="2.2" fill="#FF8C42"/>
      <rect x="27.5" y="34" width="4.5" height="7.5" rx="2.2" fill="#FF8C42"/>
      <ellipse cx="18" cy="42.5" rx="2.8" ry="1.3" fill="#FFF5E6"/>
      <ellipse cx="30" cy="42.5" rx="2.8" ry="1.3" fill="#FFF5E6"/>
    </g>
    <!-- Body -->
    <ellipse id="cat-body" cx="24" cy="30" rx="10" ry="7" fill="url(#cat-body-grad)"/>
    <ellipse cx="24" cy="32" rx="6" ry="4" fill="#FFF5E6"/>
    <!-- Head -->
    <g id="cat-head">
      <ellipse cx="24" cy="14" rx="11" ry="10" fill="#FF8C42"/>
      <polygon points="14,8 11,1 17,5" fill="#FF8C42"/>
      <polygon points="34,8 37,1 31,5" fill="#FF8C42"/>
      <polygon points="14.5,7.5 12,2.5 16.5,5.5" fill="#FFB89A"/>
      <polygon points="33.5,7.5 36,2.5 30.5,5.5" fill="#FFB89A"/>
      <!-- X eyes (hurt) -->
      <g id="cat-eyes-hurt" stroke="#2C3E50" stroke-width="2" stroke-linecap="round">
        <line x1="16.5" y1="10.5" x2="21.5" y2="15.5"/>
        <line x1="21.5" y1="10.5" x2="16.5" y2="15.5"/>
        <line x1="26.5" y1="10.5" x2="31.5" y2="15.5"/>
        <line x1="31.5" y1="10.5" x2="26.5" y2="15.5"/>
      </g>
      <ellipse cx="24" cy="17" rx="1.5" ry="1" fill="#FF6B9D"/>
      <!-- Wavy mouth (pain) -->
      <path d="M21 19 Q22.5 20 24 19 Q25.5 18 27 19" fill="none" stroke="#E06B1F" stroke-width="1" stroke-linecap="round"/>
      <!-- Sweat drop -->
      <path d="M34 8 Q35 5 34 3 Q36 5 34 8Z" fill="#5DADE2" opacity="0.7"/>
      <!-- Impact stars -->
      <g fill="#F1C40F" opacity="0.8">
        <polygon points="8,6 9,8 11,8 9.5,9.5 10,12 8,10.5 6,12 6.5,9.5 5,8 7,8" transform="scale(0.6) translate(2 0)"/>
        <polygon points="8,6 9,8 11,8 9.5,9.5 10,12 8,10.5 6,12 6.5,9.5 5,8 7,8" transform="scale(0.5) translate(62 2)"/>
      </g>
    </g>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 44">
  <defs>
    <linearGradient id="cat-body-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF8C42"/>
      <stop offset="100%" stop-color="#E8792F"/>
    </linearGradient>
  </defs>
  <g id="cat-run" transform="rotate(-5 24 24)">
    <!-- Tail raised and back -->
    <g id="cat-tail">
      <path d="M16 28 Q8 26 6 20 Q4 14 8 12" fill="none" stroke="#FF8C42" stroke-width="3" stroke-linecap="round"/>
    </g>
    <!-- Back legs (extended back) -->
    <g id="cat-legs-back">
      <rect x="14" y="34" width="4.5" height="8" rx="2.2" fill="#E06B1F" transform="rotate(15 16 34)"/>
      <rect x="28" y="33" width="4.5" height="8" rx="2.2" fill="#E06B1F" transform="rotate(-20 30 33)"/>
      <ellipse cx="18" cy="42.5" rx="2.8" ry="1.3" fill="#FFF5E6"/>
      <ellipse cx="26" cy="42" rx="2.8" ry="1.3" fill="#FFF5E6"/>
    </g>
    <!-- Body (leaning forward) -->
    <ellipse id="cat-body" cx="24" cy="29" rx="10" ry="6.5" fill="url(#cat-body-grad)"/>
    <ellipse cx="24" cy="31" rx="6" ry="3.5" fill="#FFF5E6"/>
    <!-- Stripes -->
    <path d="M20 25 Q24 23 28 25" fill="none" stroke="#E06B1F" stroke-width="1" opacity="0.6"/>
    <!-- Front legs (reaching forward) -->
    <g id="cat-legs-front">
      <rect x="18" y="33" width="4.5" height="8" rx="2.2" fill="#FF8C42" transform="rotate(-15 20 33)"/>
      <rect x="26" y="34" width="4.5" height="8" rx="2.2" fill="#FF8C42" transform="rotate(20 28 34)"/>
      <ellipse cx="17" cy="41" rx="2.8" ry="1.3" fill="#FFF5E6"/>
      <ellipse cx="31" cy="42" rx="2.8" ry="1.3" fill="#FFF5E6"/>
    </g>
    <!-- Head (slightly forward) -->
    <g id="cat-head" transform="translate(2 -1)">
      <ellipse cx="24" cy="14" rx="10.5" ry="9.5" fill="#FF8C42"/>
      <polygon points="15,8 12,1 18,5" fill="#FF8C42"/>
      <polygon points="33,8 36,1 30,5" fill="#FF8C42"/>
      <polygon points="15.5,7.5 13,2.5 17.5,5.5" fill="#FFB89A"/>
      <polygon points="32.5,7.5 35,2.5 30.5,5.5" fill="#FFB89A"/>
      <!-- Determined eyes -->
      <g id="cat-eyes">
        <ellipse cx="19" cy="13" rx="3.2" ry="3.5" fill="white"/>
        <ellipse cx="29" cy="13" rx="3.2" ry="3.5" fill="white"/>
        <ellipse cx="19" cy="13" rx="2.5" ry="2.8" fill="#4ECDC4"/>
        <ellipse cx="29" cy="13" rx="2.5" ry="2.8" fill="#4ECDC4"/>
        <ellipse cx="19.5" cy="12.5" rx="1.3" ry="1.8" fill="#2C3E50"/>
        <ellipse cx="29.5" cy="12.5" rx="1.3" ry="1.8" fill="#2C3E50"/>
        <circle cx="20.3" cy="11.5" r="0.7" fill="white"/>
        <circle cx="30.3" cy="11.5" r="0.7" fill="white"/>
      </g>
      <ellipse cx="24" cy="17" rx="1.5" ry="1" fill="#FF6B9D"/>
      <path d="M22 18.5 Q24 20 26 18.5" fill="none" stroke="#E06B1F" stroke-width="0.8"/>
      <g stroke="#E06B1F" stroke-width="0.5" opacity="0.7">
        <line x1="12" y1="15" x2="17" y2="16"/>
        <line x1="12" y1="17" x2="17" y2="17"/>
        <line x1="31" y1="16" x2="36" y2="15"/>
        <line x1="31" y1="17" x2="36" y2="17"/>
      </g>
    </g>
  </g>
</svg>

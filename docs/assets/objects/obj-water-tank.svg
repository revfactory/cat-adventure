<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 60">
  <g id="obj-water-tank">
    <!-- Legs -->
    <rect x="8" y="45" width="4" height="15" fill="#7F8C8D"/>
    <rect x="38" y="45" width="4" height="15" fill="#7F8C8D"/>
    <!-- Cross brace -->
    <line x1="10" y1="52" x2="40" y2="52" stroke="#95A5A6" stroke-width="1.5"/>
    <!-- Tank body -->
    <rect x="4" y="5" width="42" height="42" rx="4" fill="#5D6D7E" stroke="#4A5A6A" stroke-width="1.5"/>
    <!-- Water level indicator -->
    <rect x="8" y="20" width="34" height="24" fill="#3498DB" opacity="0.3"/>
    <!-- Rivets -->
    <g fill="#4A5A6A">
      <circle cx="8" cy="10" r="1.5"/>
      <circle cx="42" cy="10" r="1.5"/>
      <circle cx="8" cy="42" r="1.5"/>
      <circle cx="42" cy="42" r="1.5"/>
    </g>
    <!-- Lid -->
    <rect x="16" y="2" width="18" height="5" rx="2" fill="#7F8C8D" stroke="#5D6D7E" stroke-width="0.8"/>
    <!-- Handle -->
    <rect x="22" y="0" width="6" height="3" rx="1.5" fill="#95A5A6"/>
    <!-- Rust -->
    <circle cx="20" cy="30" r="4" fill="#A0522D" opacity="0.15"/>
    <circle cx="35" cy="18" r="3" fill="#A0522D" opacity="0.1"/>
    <!-- Drip -->
    <path d="M38 47 Q39 50 38 52" fill="none" stroke="#5DADE2" stroke-width="0.8" opacity="0.5"/>
  </g>
</svg>

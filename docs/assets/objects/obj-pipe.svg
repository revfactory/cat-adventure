<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 20">
  <defs>
    <linearGradient id="pipe-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#BDC3C7"/>
      <stop offset="30%" stop-color="#95A5A6"/>
      <stop offset="100%" stop-color="#7F8C8D"/>
    </linearGradient>
  </defs>
  <g id="obj-pipe">
    <rect x="0" y="2" width="60" height="16" rx="8" fill="url(#pipe-grad)"/>
    <!-- Joints -->
    <rect x="0" y="0" width="6" height="20" rx="1" fill="#95A5A6" stroke="#7F8C8D" stroke-width="0.8"/>
    <rect x="54" y="0" width="6" height="20" rx="1" fill="#95A5A6" stroke="#7F8C8D" stroke-width="0.8"/>
    <rect x="27" y="1" width="6" height="18" rx="1" fill="#95A5A6" stroke="#7F8C8D" stroke-width="0.5"/>
    <!-- Bolts -->
    <g fill="#5D6D7E">
      <circle cx="3" cy="5" r="1.2"/>
      <circle cx="3" cy="15" r="1.2"/>
      <circle cx="57" cy="5" r="1.2"/>
      <circle cx="57" cy="15" r="1.2"/>
    </g>
    <!-- Shine -->
    <rect x="6" y="4" width="48" height="2" rx="1" fill="white" opacity="0.2"/>
    <!-- Rust spots -->
    <circle cx="18" cy="12" r="2" fill="#A0522D" opacity="0.2"/>
    <circle cx="42" cy="8" r="1.5" fill="#A0522D" opacity="0.15"/>
  </g>
</svg>

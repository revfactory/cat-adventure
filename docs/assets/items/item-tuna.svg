<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="tuna-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F1C40F"/>
      <stop offset="100%" stop-color="#D4AC0D"/>
    </linearGradient>
  </defs>
  <g id="item-tuna">
    <!-- Can body -->
    <ellipse cx="16" cy="22" rx="10" ry="4" fill="#D4AC0D"/>
    <rect x="6" y="10" width="20" height="12" fill="url(#tuna-grad)"/>
